<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อ 2PS Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight flex items-center">
                <i data-lucide="shield-check" class="mr-2"></i> 2PS-ENGINEERING
            </h1>
            <div class="flex bg-blue-800 p-1 rounded-lg">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-md text-sm font-bold bg-white text-blue-700">หน้าหลัก</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-4 py-2 rounded-md text-sm font-medium">สแกนใบหน้า</button>
                <button onclick="switchTab('list')" id="tab-list" class="px-4 py-2 rounded-md text-sm font-medium">รายชื่อพนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div id="content-dashboard" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-green-500">
                    <p class="text-gray-500 text-sm">มาทำงานวันนี้</p>
                    <p id="stat-present" class="text-4xl font-bold text-slate-800">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-orange-500">
                    <p class="text-gray-500 text-sm">มาสาย</p>
                    <p id="stat-late" class="text-4xl font-bold text-slate-800">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-red-500">
                    <p class="text-gray-500 text-sm">ขาดงาน</p>
                    <p id="stat-absent" class="text-4xl font-bold text-slate-800">0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="font-bold mb-4 flex items-center"><i data-lucide="list" class="mr-2 w-5 h-5"></i> รายชื่อพนักงาน (วันนี้)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-orange-50 p-4 rounded-xl">
                        <span class="text-orange-600 font-bold block mb-2 underline">🕒 รายชื่อคนสาย</span>
                        <ul id="list-late" class="text-sm space-y-2 max-h-[200px] overflow-y-auto"></ul>
                    </div>
                    <div class="bg-red-50 p-4 rounded-xl">
                        <span class="text-red-600 font-bold block mb-2 underline">❌ รายชื่อคนยังไม่มา</span>
                        <ul id="list-absent" class="text-sm space-y-2 max-h-[200px] overflow-y-auto"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="hidden">
            <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl border">
                <div class="relative aspect-[4/3] bg-slate-900 rounded-2xl overflow-hidden mb-6">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                    <div id="loader" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center text-white p-6 text-center">
                        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p id="loader-text" class="text-sm font-light">กำลังเตรียมระบบ AI และข้อมูลพนักงาน...</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4 p-4 bg-slate-50 rounded-2xl border">
                    <div id="res-img-box" class="w-20 h-20 bg-slate-200 rounded-xl overflow-hidden flex items-center justify-center">
                        <i data-lucide="user" class="text-slate-400 w-10 h-10"></i>
                    </div>
                    <img id="res-img" class="w-20 h-20 rounded-xl object-cover hidden border-2 border-blue-500">
                    <div class="flex-grow">
                        <p id="res-name" class="text-xl font-bold text-slate-800">รอสแกนใบหน้า...</p>
                        <p id="res-id" class="text-sm text-slate-500 uppercase tracking-widest">Status: Ready</p>
                    </div>
                </div>
                <button onclick="sendToSheet()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">บันทึกข้อมูลเข้า Google Sheet</button>
            </div>
        </div>

        <div id="content-list" class="hidden space-y-4">
            <h2 class="text-xl font-bold">ฐานข้อมูลพนักงาน</h2>
            <div id="employee-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </div>
    </main>

    <div id="setup-modal" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center hidden">
        <div class="bg-white p-10 rounded-3xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-bold mb-4">เชื่อมต่อระบบ</h3>
            <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/AKfycbz12Xbujoil8N9_KUtlHneflD1errN4W5d_eR3eNh4odhyEoEJ95Sa1rMJPHBt0djkb/exec" class="w-full border-2 p-4 rounded-2xl mb-4 text-center">
            <button onclick="saveConfig()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">เริ่มต้นใช้งาน</button>
        </div>
    </div>

    <script>
        const GAS_URL_KEY = 'gas_url_v2';
        let gasUrl = localStorage.getItem(GAS_URL_KEY);
        let employees = [], attendances = [], faceMatcher = null, isVideoOn = false;
        let todayScanned = new Map();

        window.onload = async () => {
            lucide.createIcons();
            if (!gasUrl) {
                document.getElementById('setup-modal').classList.remove('hidden');
            } else {
                await init();
            }
        };

        async function init() {
            try {
                // 1. ดึงข้อมูลพนักงาน
                const res = await api('getStudents');
                const resA = await api('getAttendance');
                if (res.success) employees = res.data;
                if (resA.success) attendances = resA.data;

                renderEmployees();
                renderDashboard();

                // 2. โหลด AI
                const status = document.getElementById('loader-text');
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';
                
                status.innerText = "กำลังโหลดโมเดลใบหน้า...";
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');

                // 3. เตรียมข้อมูลเปรียบเทียบใบหน้า
                const labeled = [];
                for (let emp of employees) {
                    if (emp.imagedatabase64 && emp.imagedatabase64.length > 100) {
                        try {
                            status.innerText = `กำลังจำใบหน้า: ${emp.name}`;
                            const img = await faceapi.fetchImage(emp.imagedatabase64);
                            const detect = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                            if (detect) labeled.push(new faceapi.LabeledFaceDescriptors(String(emp.studentid), [detect.descriptor]));
                        } catch (e) { console.error("Skip", emp.name); }
                    }
                }

                if (labeled.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
                    document.getElementById('loader').classList.add('hidden');
                } else {
                    status.innerHTML = "<span class='text-red-500'>ไม่พบรูปพนักงานในระบบ!</span><br>กรุณาไปที่ 'รายชื่อพนักงาน' เพื่อเพิ่มรูป";
                }
            } catch (err) {
                console.error(err);
                alert("โหลดข้อมูลล้มเหลว ตรวจสอบอินเทอร์เน็ตหรือลิงก์ Script");
            }
        }

        function switchTab(id) {
            ['dashboard', 'scan', 'list'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "px-4 py-2 rounded-md text-sm font-medium";
            });
            document.getElementById(`content-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).className = "px-4 py-2 rounded-md text-sm font-bold bg-white text-blue-700";

            if (id === 'scan') {
                isVideoOn = true;
                startCamera();
            } else {
                isVideoOn = false;
                stopCamera();
            }
        }

        async function startCamera() {
            const v = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                v.srcObject = stream;
                v.onloadedmetadata = () => runDetection();
            } catch (err) { alert("เปิดกล้องไม่ได้"); }
        }

        async function runDetection() {
            const v = document.getElementById('video'), o = document.getElementById('overlay');
            if (!v || !o) return;
            const dim = { width: v.clientWidth, height: v.clientHeight };
            faceapi.matchDimensions(o, dim);

            const loop = setInterval(async () => {
                if (!isVideoOn) { clearInterval(loop); return; }
                const detections = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, dim);
                o.getContext('2d').clearRect(0,0,o.width,o.height);
                
                if (faceMatcher && detections.length > 0) {
                    detections.forEach(d => {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        if (match.label !== 'unknown') {
                            const emp = employees.find(e => String(e.studentid) === match.label);
                            if (emp) showResult(emp);
                        }
                    });
                }
                faceapi.draw.drawDetections(o, resized);
            }, 500);
        }

        function showResult(emp) {
            if (todayScanned.has(emp.studentid)) return;
            todayScanned.set(emp.studentid, emp);

            document.getElementById('res-name').innerText = emp.name;
            document.getElementById('res-id').innerText = `ID: ${emp.studentid} | สำเร็จ`;
            document.getElementById('res-img-box').classList.add('hidden');
            const img = document.getElementById('res-img');
            img.src = emp.imagedatabase64;
            img.classList.remove('hidden');

            const talk = new SpeechSynthesisUtterance(`สแกนผ่านแล้วค่ะ คุณ${emp.name}`);
            talk.lang = 'th-TH'; window.speechSynthesis.speak(talk);
        }

        async function sendToSheet() {
            if (todayScanned.size === 0) return alert("ยังไม่ได้สแกนหน้าใครเลย");
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            const status = (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() > 30)) ? "สาย" : "ปกติ";

            const data = Array.from(todayScanned.values()).map(e => ({
                id: e.studentid, name: e.name, status: status, timestamp: now.toISOString()
            }));

            const res = await api('recordAttendanceUpdate', data);
            if (res.success) {
                alert("บันทึกเข้าระบบสำเร็จ!");
                location.reload();
            }
        }

        function renderDashboard() {
            const today = new Date().toISOString().split('T')[0];
            const daily = attendances.filter(a => a.timestamp && a.timestamp.includes(today));
            
            document.getElementById('stat-present').innerText = daily.filter(a => a.status === 'ปกติ').length;
            document.getElementById('stat-late').innerText = daily.filter(a => a.status === 'สาย').length;
            document.getElementById('stat-absent').innerText = employees.length - daily.length;

            const lateUl = document.getElementById('list-late');
            const absUl = document.getElementById('list-absent');
            lateUl.innerHTML = ''; absUl.innerHTML = '';

            daily.filter(a => a.status === 'สาย').forEach(a => {
                lateUl.innerHTML += `<li class="flex items-center space-x-2"><i data-lucide="clock" class="w-4 h-4 text-orange-500"></i> <span>${a.name}</span></li>`;
            });

            const checkedIds = daily.map(a => String(a.id));
            employees.forEach(e => {
                if (!checkedIds.includes(String(e.studentid))) {
                    absUl.innerHTML += `<li class="flex items-center space-x-2"><i data-lucide="user-x" class="w-4 h-4 text-red-500"></i> <span>${e.name}</span></li>`;
                }
            });
            lucide.createIcons();
        }

        function renderEmployees() {
            const grid = document.getElementById('employee-grid');
            grid.innerHTML = employees.map(e => `
                <div class="bg-white p-3 rounded-xl shadow-sm border text-center">
                    <img src="${e.imagedatabase64}" class="w-full aspect-square object-cover rounded-lg mb-2 bg-slate-100">
                    <p class="text-xs font-bold truncate">${e.name}</p>
                    <p class="text-[10px] text-slate-400">ID: ${e.studentid}</p>
                </div>
            `).join('');
        }

        async function api(action, data = null) {
            const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action, data }) });
            return await res.json();
        }

        function saveConfig() {
            const url = document.getElementById('gas-url').value;
            if (url.includes('google.com')) { localStorage.setItem(GAS_URL_KEY, url); location.reload(); }
        }

        function stopCamera() {
            const v = document.getElementById('video');
            if (v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>

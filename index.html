<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อพนักงาน - 2PS Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', 'Kanit', sans-serif; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-blue-600 font-bold uppercase tracking-wider">
            <i data-lucide="shield-check"></i> <span>2PS-ENGINEERING</span>
        </div>
        <div class="flex bg-slate-100 p-1 rounded-xl">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-lg text-sm font-bold bg-blue-600 text-white">Dashboard</button>
            <button onclick="switchTab('scan')" id="tab-scan" class="px-4 py-2 rounded-lg text-sm font-medium">เช็คชื่อ</button>
            <button onclick="switchTab('manage')" id="tab-manage" class="px-4 py-2 rounded-lg text-sm font-medium">พนักงาน</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="content-dashboard" class="tab-content animate-fade-in space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold italic text-slate-800">รายงานการเข้างาน</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="border p-2 rounded-xl">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 text-center">
                    <p class="text-slate-400 text-sm">มาปกติ</p><p id="stat-present" class="text-3xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-amber-500 text-center">
                    <p class="text-slate-400 text-sm">มาสาย</p><p id="stat-late" class="text-3xl font-bold text-amber-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-rose-500 text-center">
                    <p class="text-slate-400 text-sm">ยังไม่เช็คชื่อ</p><p id="stat-absent" class="text-3xl font-bold text-rose-600">0</p>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl border h-[400px] flex flex-col">
                    <h3 class="font-bold mb-4">🕒 รายชื่อพนักงานสาย</h3>
                    <ul id="late-list" class="overflow-y-auto space-y-2 flex-grow"></ul>
                </div>
                <div class="bg-white p-6 rounded-2xl border h-[400px] flex flex-col">
                    <h3 class="font-bold mb-4">❌ รายชื่อพนักงานยังไม่มา</h3>
                    <ul id="absent-list" class="overflow-y-auto space-y-2 flex-grow"></ul>
                </div>
            </div>
        </div>

        <div id="content-scan" class="tab-content hidden">
            <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-lg relative">
                <div class="relative aspect-[4/3] bg-black rounded-2xl overflow-hidden">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="mt-4 flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border">
                    <img id="res-img" class="w-16 h-16 rounded-lg object-cover border hidden">
                    <div>
                        <h3 id="res-name" class="font-bold text-lg">รอการสแกน...</h3>
                        <p id="res-id" class="text-sm text-slate-400 uppercase">Ready</p>
                    </div>
                </div>
                <button onclick="finishAttendance()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">บันทึกพนักงานลง Sheets</button>
            </div>
        </div>

        <div id="content-manage" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-xl text-slate-800">จัดการพนักงาน</h2>
                <button onclick="document.getElementById('modal-student').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ เพิ่มพนักงาน</button>
            </div>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50"><tr><th class="p-4">รูป</th><th class="p-4">รหัส</th><th class="p-4">ชื่อ</th><th class="p-4">แผนก</th><th class="p-4">จัดการ</th></tr></thead>
                    <tbody id="student-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-student" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full space-y-4">
            <h3 class="font-bold text-center underline">เพิ่มพนักงานใหม่</h3>
            <div class="w-32 h-32 bg-slate-100 mx-auto rounded-xl border-2 border-dashed overflow-hidden relative">
                <video id="modal-video" class="w-full h-full object-cover hidden" autoplay muted playsinline></video>
                <img id="preview-img" class="w-full h-full object-cover">
            </div>
            <div class="flex justify-center space-x-2">
                <button onclick="startModalCamera()" class="bg-slate-800 text-white text-xs px-3 py-1 rounded">เปิดกล้อง</button>
                <button id="btn-snap" onclick="snap()" class="bg-blue-600 text-white text-xs px-3 py-1 rounded hidden">ถ่ายรูป</button>
            </div>
            <input type="text" id="m-id" placeholder="รหัสพนักงาน" class="w-full border p-2 rounded-lg">
            <input type="text" id="m-name" placeholder="ชื่อ-นามสกุล" class="w-full border p-2 rounded-lg">
            <input type="text" id="m-class" placeholder="แผนก" class="w-full border p-2 rounded-lg">
            <button onclick="saveNewStudent()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">บันทึกข้อมูล</button>
            <button onclick="closeModal()" class="w-full text-slate-400 text-xs text-center">ยกเลิก</button>
        </div>
    </div>

    <div id="modal-setup" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl text-center"><input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/AKfycbz12Xbujoil8N9_KUtlHneflD1errN4W5d_eR3eNh4odhyEoEJ95Sa1rMJPHBt0djkb/exec" class="border p-2 w-64 block mb-4 mx-auto"><button onclick="saveUrl()" class="bg-blue-600 text-white px-8 py-2 rounded-lg">เริ่มใช้งาน</button></div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const KEY = 'gas_url_2ps';
        let gasUrl = localStorage.getItem(KEY);
        let students = [], attendance = [], faceMatcher = null, scanned = new Map(), capImg = null;

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
            if(!gasUrl) document.getElementById('modal-setup').classList.remove('hidden');
            else { await loadData(); await initFace(); }
        };

        async function loadData() {
            const [s, a] = await Promise.all([apiCall({action:'getStudents'}), apiCall({action:'getAttendance'})]);
            if(s.success) students = s.data;
            if(a.success) attendance = a.data;
            renderTable(); renderDashboard();
        }

        // --- ใช้ชุดสแกนดั้งเดิมที่เร็ว ---
        async function initFace() {
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);

            const labeled = [];
            for(const s of students) {
                if(s.imagedatabase64) {
                    const img = await faceapi.fetchImage(s.imagedatabase64);
                    const d = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                    if(d) labeled.push(new faceapi.LabeledFaceDescriptors(String(s.studentid), [d.descriptor]));
                }
            }
            if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.45);
        }

        async function detect() {
            const v = document.getElementById('video'), o = document.getElementById('overlay');
            const dim = { width: v.clientWidth, height: v.clientHeight };
            faceapi.matchDimensions(o, dim);

            setInterval(async () => {
                const dets = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const res = faceapi.resizeResults(dets, dim);
                o.getContext('2d').clearRect(0,0,o.width,o.height);
                faceapi.draw.drawDetections(o, res);

                if(faceMatcher && dets.length > 0) {
                    dets.forEach(d => {
                        const m = faceMatcher.findBestMatch(d.descriptor);
                        const s = students.find(x => String(x.studentid) === m.label);
                        if(s && m.distance < 0.4) {
                            if(!scanned.has(s.studentid)) {
                                scanned.set(s.studentid, s);
                                document.getElementById('res-name').innerText = s.name;
                                document.getElementById('res-id').innerText = s.studentid;
                                document.getElementById('res-img').src = s.imagedatabase64;
                                document.getElementById('res-img').classList.remove('hidden');
                                speak(`สวัสดีค่ะ คุณ${s.name}`);
                            }
                        }
                    });
                }
            }, 500);
        }

        // --- ส่วนบันทึก (แก้ไข Timestamp และ Class) ---
        async function finishAttendance() {
            if(scanned.size === 0) return alert("ยังไม่ได้สแกนหน้า");
            
            // ดึงพิกัด
            let loc = "0,0";
            try {
                const p = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej));
                loc = `${p.coords.latitude},${p.coords.longitude}`;
            } catch(e){}

            // เวลาไทย
            const now = new Date();
            const time = now.toLocaleTimeString('th-TH');
            const date = now.toLocaleDateString('th-TH');
            const stamp = `${date} ${time}`;
            const status = (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() > 30)) ? 'สาย' : 'มา';

            const data = Array.from(scanned.values()).map(s => ({
                id: s.studentid,
                name: s.name,
                class: s.class || '-',
                timestamp: stamp,
                location: loc,
                status: status
            }));

            const res = await apiCall({action:'recordAttendanceUpdate', data: data});
            if(res.success) { alert("บันทึกสำเร็จ"); location.reload(); }
        }

        function renderDashboard() {
            const date = document.getElementById('dashboard-date').value;
            const daily = attendance.filter(a => a.timestamp && (a.timestamp.includes(date) || a.timestamp.includes(new Date(date).toLocaleDateString('th-TH'))));
            const checkedIds = new Set(daily.map(a => String(a.id)));
            
            document.getElementById('stat-present').innerText = daily.filter(a => a.status === 'มา').length;
            document.getElementById('stat-late').innerText = daily.filter(a => a.status === 'สาย').length;
            document.getElementById('stat-absent').innerText = Math.max(0, students.length - checkedIds.size);

            const lateL = document.getElementById('late-list'), absL = document.getElementById('absent-list');
            lateL.innerHTML = ''; absL.innerHTML = '';

            daily.filter(a => a.status === 'สาย').forEach(a => {
                lateL.innerHTML += `<li class="p-2 bg-amber-50 rounded border-l-4 border-amber-500 text-xs font-bold">${a.name} (${a.timestamp.split(' ')[1]})</li>`;
            });
            students.forEach(s => {
                if(!checkedIds.has(String(s.studentid))) {
                    absL.innerHTML += `<li class="p-2 bg-rose-50 rounded border-l-4 border-rose-500 text-xs font-bold">${s.name}</li>`;
                }
            });
        }

        // --- ฟังก์ชันอื่นๆ ---
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`content-${t}`).classList.remove('hidden');
            if(t === 'scan') startCam(); else stopCam('video');
        }

        async function startCam() {
            const v = document.getElementById('video');
            v.srcObject = await navigator.mediaDevices.getUserMedia({video:true});
            v.onloadedmetadata = () => detect();
        }

        async function saveNewStudent() {
            const id = document.getElementById('m-id').value;
            const name = document.getElementById('m-name').value;
            const cls = document.getElementById('m-class').value;
            if(!id || !name || !capImg) return alert("กรอกข้อมูลไม่ครบ");
            const res = await apiCall({action:'addStudent', data: {id, name, class: cls, imageData: capImg}});
            if(res.success) { alert("เพิ่มสำเร็จ"); location.reload(); }
        }

        function renderTable() {
            document.getElementById('student-table-body').innerHTML = students.map(s => `
                <tr><td class="p-4"><img src="${s.imagedatabase64}" class="w-10 h-10 rounded object-cover"></td>
                <td class="p-4">${s.studentid}</td><td class="p-4 font-bold">${s.name}</td>
                <td class="p-4 text-xs text-slate-400">${s.class || '-'}</td>
                <td class="p-4"><button onclick="delSt(${s.rowIndex})" class="text-rose-500">ลบ</button></td></tr>
            `).join('');
        }

        async function apiCall(p) {
            try { const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)}); return await r.json(); } 
            catch(e) { return {success:false}; }
        }

        function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'th-TH'; window.speechSynthesis.speak(m); }
        function stopCam(id) { const v = document.getElementById(id); if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop()); }
        async function startModalCamera() { 
            const v = document.getElementById('modal-video');
            v.srcObject = await navigator.mediaDevices.getUserMedia({video:true});
            v.classList.remove('hidden'); document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('btn-snap').classList.remove('hidden');
        }
        function snap() {
            const v = document.getElementById('modal-video'), c = document.getElementById('canvas');
            c.width = 300; c.height = 300; c.getContext('2d').drawImage(v, 0, 0, 300, 300);
            capImg = c.toDataURL('image/jpeg');
            document.getElementById('preview-img').src = capImg;
            document.getElementById('preview-img').classList.remove('hidden');
            v.classList.add('hidden'); stopCam('modal-video');
        }
        function closeModal() { stopCam('modal-video'); document.getElementById('modal-student').classList.add('hidden'); }
        function saveUrl() { const u = document.getElementById('gas-url').value; localStorage.setItem(KEY, u); location.reload(); }
        async function delSt(i) { if(confirm("ลบไหม?")) { await apiCall({action:'deleteStudent', data:{rowIndex:i}}); location.reload(); } }
    </script>
</body>
</html>

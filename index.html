<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนหน้าเข้าออกพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Kanit', sans-serif; background-color: #1a1c1e; color: #f8fafc; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .video-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; border-radius: 1.5rem; overflow: hidden; background: #000; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    #video { width: 100%; height: 100%; object-fit: cover; transform: rotateY(180deg); }
    #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: rotateY(180deg); }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to bottom, transparent, #10b981, transparent); box-shadow: 0 0 15px #10b981; animation: scan 2s linear infinite; z-index: 10; display: none; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <!-- Header -->
    <div class="w-full max-w-lg flex flex-col items-center mb-6">
        <img src="https://img5.pic.in.th/file/secure-sv1/thaisiam-removebg-preview.png" alt="Logo" class="h-14 mb-4">
        <h1 class="text-xl font-bold text-emerald-400">ระบบบันทึกเวลา THAISIAM</h1>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-lg glass-card p-5 rounded-[2.5rem] shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span id="status-text" class="text-xs bg-slate-800 px-3 py-1 rounded-full text-slate-400">🔴 ปิดระบบ</span>
            <span id="time-display" class="font-mono text-sm">--:--:--</span>
        </div>

        <div class="video-container mb-4">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="scan-line" class="scan-line"></div>
            
            <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 z-20">
                <button onclick="initApp()" id="btn-start" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-full font-bold shadow-xl transition-all flex items-center gap-2">
                    <i data-lucide="play"></i> เปิดกล้องใช้งาน
                </button>
            </div>
        </div>

        <!-- ข้อมูลพนักงาน -->
        <div id="staff-card" class="hidden w-full bg-slate-800/80 rounded-2xl p-4 mb-4 border border-emerald-500/20">
            <div class="flex items-center gap-4">
                <img id="staff-image" src="" class="w-16 h-16 rounded-xl object-cover bg-slate-700">
                <div class="flex-1">
                    <h3 id="staff-name" class="font-bold text-white">--</h3>
                    <p id="staff-id" class="text-emerald-400 text-xs font-mono">ID: --</p>
                </div>
                <button onclick="resetUI()" class="text-slate-500 p-2"><i data-lucide="x-circle"></i></button>
            </div>
            <div id="action-buttons" class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="confirmAttendance('IN')" class="py-3 bg-emerald-600 rounded-xl font-bold">เข้างาน</button>
                <button onclick="confirmAttendance('OUT')" class="py-3 bg-rose-600 rounded-xl font-bold">ออกงาน</button>
                <button onclick="registerFace()" id="btn-reg" class="col-span-2 py-2 bg-amber-500 rounded-xl font-bold text-sm">ลงทะเบียนใบหน้าพนักงานคนนี้</button>
            </div>
        </div>

        <!-- ปุ่มควบคุมหลัก -->
        <div id="main-controls" class="grid grid-cols-2 gap-4">
            <button onclick="openModal()" class="flex flex-col items-center gap-2 p-4 bg-slate-800 rounded-2xl border border-white/5">
                <i data-lucide="keypad" class="text-blue-400"></i>
                <span class="text-xs">ใส่รหัสพนักงาน</span>
            </button>
            <button onclick="syncData()" class="flex flex-col items-center gap-2 p-4 bg-slate-800 rounded-2xl border border-white/5">
                <i data-lucide="refresh-cw" id="sync-icon" class="text-purple-400"></i>
                <span class="text-xs">อัปเดตข้อมูล</span>
            </button>
        </div>
    </div>

    <!-- Modal ค้นหา -->
    <div id="searchModal" class="modal">
        <div class="bg-white p-6 w-[90%] max-w-[350px] rounded-3xl shadow-2xl">
            <h3 class="text-slate-900 font-bold mb-4 text-center">ค้นหารหัสพนักงาน</h3>
            <input type="text" id="inputSearchId" inputmode="numeric" placeholder="ป้อนรหัส 6 หลัก" 
                   class="w-full p-4 text-2xl font-bold border-2 border-slate-100 rounded-2xl text-center text-slate-900 bg-slate-50 mb-4 outline-none focus:border-emerald-500">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-sm">ปิด</button>
                <button onclick="doSearch()" class="flex-1 py-3 bg-emerald-500 text-white rounded-xl font-bold text-sm">ค้นหา</button>
            </div>
        </div>
    </div>

    <script>
        // *** แก้ไข URL ของคุณที่นี่ ***
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzeHotjOIF6_P5N82ByzrVIPamzMu_JnL27mc551WBdAfzKwCxD3akItWtcSd7cPO5a/exec';
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';

        let staffList = [];
        let activeStaff = null;
        let isCamStarted = false;

        async function initApp() {
            const btn = document.getElementById('btn-start');
            btn.innerHTML = "⌛ กำลังโหลด AI...";
            btn.disabled = true;

            try {
                // 1. โหลดข้อมูลพนักงานก่อนเลย
                await syncData(false);
                
                // 2. โหลด AI
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                // 3. เริ่มกล้อง
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                document.getElementById('video').srcObject = stream;
                
                document.getElementById('start-overlay').classList.add('hidden');
                document.getElementById('status-text').innerHTML = "🟢 ระบบพร้อมใช้งาน";
                isCamStarted = true;
                lucide.createIcons();
            } catch (err) {
                alert("เปิดระบบไม่สำเร็จ: " + err.message);
                btn.innerHTML = "ลองใหม่อีกครั้ง";
                btn.disabled = false;
            }
        }

        async function syncData(showAlert = true) {
            const icon = document.getElementById('sync-icon');
            if(icon) icon.classList.add('animate-spin');
            
            try {
                const res = await fetch(`${GAS_URL}?action=getStudents`);
                const result = await res.json();
                if (result.success) {
                    staffList = result.data;
                    console.log("โหลดข้อมูลสำเร็จ:", staffList.length, "คน");
                    if(showAlert) alert("อัปเดตข้อมูลพนักงาน " + staffList.length + " คนเรียบร้อย");
                }
            } catch (e) {
                console.error("Sync Error:", e);
                if(showAlert) alert("ดึงข้อมูลไม่สำเร็จ โปรดเช็คเน็ตหรือ URL ของคุณ");
            } finally {
                if(icon) icon.classList.remove('animate-spin');
            }
        }

        function openModal() { document.getElementById('searchModal').style.display = 'flex'; setTimeout(()=> document.getElementById('inputSearchId').focus(), 100); }
        function closeModal() { document.getElementById('searchModal').style.display = 'none'; }

        function doSearch() {
            const inputVal = document.getElementById('inputSearchId').value.trim();
            if(!inputVal) return;

            // ค้นหาแบบยืดหยุ่น (ลองทั้งเทียบตัวอักษรและเทียบตัวเลข)
            const found = staffList.find(s => 
                String(s.studentid).trim() === String(inputVal) || 
                String(s.id).trim() === String(inputVal)
            );

            if (found) {
                closeModal();
                showStaffUI(found);
            } else {
                alert("ไม่พบพนักงานรหัส " + inputVal + "\nโปรดตรวจสอบว่ารหัสใน Google Sheets ช่อง Student ID ถูกต้องหรือไม่?");
            }
        }

        function showStaffUI(staff) {
            activeStaff = staff;
            document.getElementById('staff-name').innerText = staff.name;
            document.getElementById('staff-id').innerText = 'รหัสพนักงาน: ' + staff.studentid;
            document.getElementById('staff-image').src = staff.imagedatabase64 || 'https://via.placeholder.com/150';
            
            document.getElementById('staff-card').classList.remove('hidden');
            document.getElementById('main-controls').classList.add('hidden');
            document.getElementById('scan-line').style.display = 'block';
        }

        function resetUI() {
            activeStaff = null;
            document.getElementById('staff-card').classList.add('hidden');
            document.getElementById('main-controls').classList.remove('hidden');
            document.getElementById('scan-line').style.display = 'none';
            document.getElementById('inputSearchId').value = "";
        }

        async function registerFace() {
            const btn = document.getElementById('btn-reg');
            const video = document.getElementById('video');
            btn.innerText = "⌛ กำลังแสกนใบหน้า...";
            btn.disabled = true;

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptor();

            if (detection) {
                const desc = JSON.stringify(Array.from(detection.descriptor));
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'saveDescriptor', studentid: activeStaff.studentid, descriptor: desc })
                    });
                    const resJson = await res.json();
                    if(resJson.success) {
                        alert("ลงทะเบียนใบหน้าสำเร็จ!");
                        location.reload();
                    } else { throw new Error(); }
                } catch(e) { alert("บันทึกลงฐานข้อมูลไม่สำเร็จ"); }
            } else {
                alert("ไม่พบใบหน้า กรุณามองตรงไปที่กล้อง");
            }
            btn.disabled = false;
            btn.innerText = "ลงทะเบียนใบหน้าพนักงานคนนี้";
        }

        async function confirmAttendance(type) {
            if(!activeStaff) return;
            document.getElementById('status-text').innerText = "⏳ กำลังบันทึก...";
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'recordAttendanceUpdate',
                        data: [{
                            id: activeStaff.studentid,
                            name: activeStaff.name,
                            class: activeStaff.class || 'ทั่วไป',
                            type: type
                        }]
                    })
                });
                alert("บันทึก " + (type === 'IN' ? 'เข้างาน' : 'ออกงาน') + " เรียบร้อย");
                location.reload();
            } catch(e) {
                alert("บันทึกไม่สำเร็จ โปรดลองอีกครั้ง");
                document.getElementById('status-text').innerText = "🟢 พร้อมใช้งาน";
            }
        }

        setInterval(() => {
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString('th-TH');
        }, 1000);
        lucide.createIcons();
    </script>
</body>
</html>

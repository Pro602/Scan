<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="layout-dashboard"></i></div>
                <span class="text-xl font-bold text-gray-800 uppercase">Thaisiam Inkjet</span>
            </div>
            <div class="flex bg-gray-100 p-1 rounded-xl">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">Dashboard</button>
                <button onclick="switchTab('scan')" id="nav-scan" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">เช็คชื่อ</button>
                <button onclick="switchTab('manage')" id="nav-manage" class="px-6 py-2 rounded-lg text-sm font-medium transition-all">จัดการพนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="tab-dashboard" class="tab-content space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">รายงานวันนี้</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="border-2 rounded-xl px-4 py-2 shadow-sm focus:border-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 text-center">
                    <p class="text-gray-500 text-sm">ปกติ</p>
                    <p id="stat-present" class="text-4xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-amber-500 text-center">
                    <p class="text-gray-500 text-sm">สาย</p>
                    <p id="stat-late" class="text-4xl font-bold text-amber-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-rose-500 text-center">
                    <p class="text-gray-500 text-sm">ขาด</p>
                    <p id="stat-absent" class="text-4xl font-bold text-rose-600">0</p>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-2xl shadow-sm border flex flex-col items-center">
                    <h3 class="font-bold text-gray-700 mb-6">สัดส่วนพนักงาน</h3>
                    <div class="w-full max-w-[250px]"><canvas id="attendance-pie-chart"></canvas></div>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border h-[400px] overflow-hidden flex flex-col">
                    <h3 class="font-bold text-gray-700 mb-4 border-b pb-4">พนักงานที่ไม่ปกติ</h3>
                    <div class="grid grid-cols-2 gap-6 h-full">
                        <ul id="late-list" class="overflow-y-auto custom-scrollbar text-sm space-y-1"></ul>
                        <ul id="absent-list" class="overflow-y-auto custom-scrollbar text-sm space-y-1 border-l pl-4"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-scan" class="tab-content hidden">
            <div class="max-w-3xl mx-auto space-y-6">
                <div class="relative aspect-video bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border-4 border-white">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                    <div id="loading-overlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center text-white space-y-4">
                        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="font-medium">กำลังโหลดฐานข้อมูลใบหน้า...</p>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-lg flex items-center space-x-8">
                    <img id="result-img" class="w-24 h-24 rounded-2xl object-cover border-4 border-blue-50 hidden">
                    <div id="result-placeholder" class="w-24 h-24 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300">
                        <i data-lucide="user-search" class="w-10 h-10"></i>
                    </div>
                    <div class="flex-grow">
                        <h3 id="result-name" class="text-2xl font-bold text-slate-800">รอสแกน...</h3>
                        <p id="result-id" class="text-slate-400 font-medium tracking-tighter">READY</p>
                    </div>
                    <button onclick="finishAttendance()" class="bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold hover:bg-black shadow-xl">บันทึกวันนี้</button>
                </div>
            </div>
        </div>

        <div id="tab-manage" class="tab-content hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">ฐานข้อมูลพนักงาน</h2>
                <button onclick="openStudentModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg flex items-center">
                    <i data-lucide="user-plus" class="w-4 h-4 mr-2"></i> เพิ่มพนักงาน
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-slate-500">
                        <tr>
                            <th class="px-8 py-4">รูป</th>
                            <th class="px-8 py-4">ID</th>
                            <th class="px-8 py-4">ชื่อ</th>
                            <th class="px-8 py-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="student-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-center text-slate-800">เพิ่มพนักงานใหม่</h3>
            <div class="space-y-4">
                <div class="relative w-40 h-40 bg-slate-100 rounded-3xl overflow-hidden mx-auto border-4 border-white shadow-md">
                    <video id="modal-video" class="w-full h-full object-cover hidden" autoplay muted playsinline></video>
                    <img id="preview-img" class="w-full h-full object-cover">
                </div>
                <div class="flex justify-center space-x-2">
                    <button id="btn-start-camera" onclick="startCaptureCamera()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold">เปิดกล้อง</button>
                    <button id="btn-snap" onclick="snapPhoto()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hidden">ถ่ายรูป</button>
                </div>
                <input type="text" id="modal-studentid" placeholder="รหัสพนักงาน" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500 shadow-sm">
                <input type="text" id="modal-name" placeholder="ชื่อ-นามสกุล" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500 shadow-sm">
                <input type="text" id="modal-class" placeholder="แผนก" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-blue-500 shadow-sm">
                <button id="btn-save-student" onclick="saveStudent()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">บันทึกลงระบบ</button>
                <button onclick="closeStudentModal()" class="w-full text-slate-400 text-sm">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="setup-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 hidden">
        <div class="bg-white rounded-3xl p-10 max-w-lg w-full mx-4 text-center shadow-2xl">
            <h3 class="text-3xl font-bold mb-4">เชื่อมต่อระบบ</h3>
            <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/AKfycbycEavs2Tq0JOLp2gOImFBNuO-aywfAFpHjhKcTkXFpx0DGHX7ocqmhCr2X__TV07ea/exec" class="w-full border-2 p-4 rounded-2xl mb-6 text-center outline-none focus:border-blue-500 shadow-sm">
            <button onclick="saveGasUrl()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-xl">บันทึกและเริ่มต้น</button>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
        const GAS_URL_KEY = 'gasWebAppUrl';
        let gasWebAppUrl = localStorage.getItem(GAS_URL_KEY);
        let students = [], attendance = [], faceMatcher = null, isVideoRunning = false;
        let checkedInToday = new Map(), capturedImageData = null, pieChart = null;

  // 1. แก้ไข window.onload ให้โหลดข้อมูลพนักงานให้จบก่อนเริ่ม Face API
        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
            
            if (!gasWebAppUrl) {
                document.getElementById('setup-modal').classList.remove('hidden');
            } else {
                // โหลดข้อมูลจาก Google Sheets
                await loadAllData(); 
                
                // เริ่มโหลดโมเดลสแกนหน้า (เฉพาะเมื่อมีพนักงานในระบบ)
                if (students && students.length > 0) {
                    await initializeFaceAPI();
                } else {
                    console.log("ยังไม่มีข้อมูลพนักงานในระบบ");
                    const loader = document.getElementById('loading-overlay');
                    if (loader) loader.classList.add('hidden');
                }
            }
        };

        async function loadAllData() {
            const resS = await apiCall({ action: 'getStudents' });
            if (resS.success) { 
                students = resS.data; 
                renderStudentTable(); 
            }
            const resA = await apiCall({ action: 'getAttendance' });
            if (resA.success) { 
                attendance = resA.data; 
                renderDashboard(); 
            }
            switchTab('dashboard');
        }

// 2. ปรับปรุงการสร้าง FaceMatcher ให้เสถียรขึ้น
        async function initializeFaceAPI() {
            const loader = document.getElementById('loading-overlay');
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                const labeledDescriptors = [];
                for (const s of students) {
                    // ตรวจสอบว่ามีข้อมูลรูปภาพในรูปแบบ Base64 หรือไม่
                    if (s.imagedatabase64 && s.imagedatabase64.includes('base64')) {
                        try {
                            const img = await faceapi.fetchImage(s.imagedatabase64);
                            const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                            if (det) {
                                labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(s.studentid.toString(), [det.descriptor]));
                            }
                        } catch (e) { console.error("ไม่สามารถประมวลผลรูปของ:", s.name); }
                    }
                }

                if (labeledDescriptors.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
                    console.log("Face Matcher Ready!");
                }
                if (loader) loader.classList.add('hidden');
            } catch (err) {
                console.error("FaceAPI Error:", err);
                if (loader) loader.classList.add('hidden');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.className = 'px-6 py-2 rounded-lg text-sm font-medium transition-all text-slate-500 hover:bg-white';
            });
            
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`nav-${tabId}`).className = 'px-6 py-2 rounded-lg text-sm font-bold bg-white text-blue-600 shadow-sm';
            
            if (tabId === 'scan') {
                isVideoRunning = true;
                startCamera();
            } else {
                isVideoRunning = false;
                stopCamera('video');
            }
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    detectFaceLoop();
                };
            } catch (e) { alert("ไม่สามารถเข้าถึงกล้องได้"); }
        }

        async function detectFaceLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            if (!video || !overlay) return;

            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            const timer = setInterval(async () => {
                if (!isVideoRunning) { clearInterval(timer); return; }
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                if (faceMatcher && detections.length > 0) {
                    detections.forEach(d => {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        const student = students.find(s => s.studentid.toString() === match.label);
                        if (student && match.distance < 0.5) markAttendance(student);
                    });
                }
                faceapi.draw.drawDetections(overlay, resized);
            }, 600);
        }

        function markAttendance(student) {
            if (checkedInToday.has(student.studentid)) return;
            checkedInToday.set(student.studentid, true);

            document.getElementById('result-placeholder').classList.add('hidden');
            const resImg = document.getElementById('result-img');
            resImg.src = student.imagedatabase64;
            resImg.classList.remove('hidden');
            
            document.getElementById('result-name').innerText = student.name;
            document.getElementById('result-id').innerText = `ID: ${student.studentid}`;
            
            const msg = new SpeechSynthesisUtterance(`${student.name} เช็คชื่อเรียบร้อยครับ`);
            msg.lang = 'th-TH';
            window.speechSynthesis.speak(msg);
        }

        async function saveStudent() {
            const btn = document.getElementById('btn-save-student');
            const sId = document.getElementById('modal-studentid').value;
            const sName = document.getElementById('modal-name').value;
            const sClass = document.getElementById('modal-class').value;

            if (!sId || !sName || !capturedImageData) return alert("กรุณากรอกข้อมูลและถ่ายรูปให้ครบ!");

            const payload = {
                action: 'addStudent',
                data: { id: sId, name: sName, class: sClass, imageData: capturedImageData }
            };

            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            const res = await apiCall(payload);
            if (res.success) {
                alert("บันทึกพนักงานสำเร็จ!");
                location.reload();
            } else {
                alert("ผิดพลาด: " + res.error);
                btn.disabled = false; btn.innerText = "บันทึกลงระบบ";
            }
        }

        async function startCaptureCamera() {
            const v = document.getElementById('modal-video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            v.srcObject = stream;
            v.classList.remove('hidden');
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('btn-start-camera').classList.add('hidden');
            document.getElementById('btn-snap').classList.remove('hidden');
        }

        function snapPhoto() {
            const v = document.getElementById('modal-video');
            const c = document.getElementById('capture-canvas');
            c.width = 400; c.height = 400;
            c.getContext('2d').drawImage(v, 0, 0, 400, 400);
            capturedImageData = c.toDataURL('image/jpeg', 0.8);
            stopCamera('modal-video');
            document.getElementById('preview-img').src = capturedImageData;
            document.getElementById('preview-img').classList.remove('hidden');
            v.classList.add('hidden');
            document.getElementById('btn-snap').classList.add('hidden');
            document.getElementById('btn-start-camera').classList.remove('hidden');
        }

        function renderStudentTable() {
            const body = document.getElementById('student-table-body');
            body.innerHTML = students.map(s => `<tr>
                <td class="px-8 py-4"><img src="${s.imagedatabase64}" class="w-12 h-12 rounded-xl object-cover shadow-sm"></td>
                <td class="px-8 py-4 font-bold text-slate-700">${s.studentid}</td>
                <td class="px-8 py-4 text-slate-600">${s.name}</td>
                <td class="px-8 py-4 text-center">
                    <button onclick="deleteStudent(${s.rowIndex})" class="text-rose-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </td>
            </tr>`).join('');
            lucide.createIcons();
        }

        async function deleteStudent(rowIndex) {
            if (!confirm("ลบพนักงานคนนี้?")) return;
            const res = await apiCall({ action: 'deleteStudent', data: { rowIndex } });
            if (res.success) location.reload();
        }

// 3. ปรับฟังก์ชันแสดง Dashboard ให้ดึงรายชื่อพนักงานที่ 'ขาด' มาโชว์
        function renderDashboard() {
            const selectedDate = document.getElementById('dashboard-date').value;
            // กรองข้อมูลการเช็คชื่อของวันที่เลือก
            const dailyAttendance = attendance.filter(a => a.timestamp && a.timestamp.includes(selectedDate));
            
            const present = dailyAttendance.filter(a => a.status === 'มาทำงาน').length;
            const late = dailyAttendance.filter(a => a.status === 'สาย').length;
            const totalPresent = present + late;
            const absent = Math.max(0, students.length - totalPresent);

            document.getElementById('stat-present').innerText = present;
            document.getElementById('stat-late').innerText = late;
            document.getElementById('stat-absent').innerText = absent;

            // รายชื่อคนมาสาย
            const lateList = document.getElementById('late-list');
            lateList.innerHTML = '<span class="text-amber-600 font-bold text-xs block mb-2 underline">รายชื่อมาสาย</span>';
            dailyAttendance.filter(a => a.status === 'สาย').forEach(a => {
                lateList.innerHTML += `<li class="p-2 bg-amber-50 rounded-lg text-amber-700 text-xs mb-1 border-l-4 border-amber-500">${a.name}</li>`;
            });

            // รายชื่อคนขาด (มีชื่อในระบบแต่ไม่มีประวัติเช็คชื่อวันนี้)
            const absentList = document.getElementById('absent-list');
            absentList.innerHTML = '<span class="text-rose-600 font-bold text-xs block mb-2 underline">รายชื่อขาด/ลา</span>';
            const checkedIds = new Set(dailyAttendance.map(a => a.id.toString()));
            
            students.forEach(s => {
                if (!checkedIds.has(s.studentid.toString())) {
                    absentList.innerHTML += `<li class="p-2 bg-rose-50 rounded-lg text-rose-700 text-xs mb-1 border-l-4 border-rose-500">${s.name}</li>`;
                }
            });

            updateChart(present, late, absent);
        }

        function updateChart(p, l, a) {
            const ctx = document.getElementById('attendance-pie-chart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['ปกติ', 'สาย', 'ขาด'],
                    datasets: [{ data: [p, l, a], backgroundColor: ['#10B981', '#F59E0B', '#EF4444'], borderWidth: 0 }]
                },
                options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function finishAttendance() {
            const now = new Date();
            const status = (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() >= 31)) ? 'สาย' : 'มาทำงาน';
            const records = students.map(s => {
                if(!checkedInToday.has(s.studentid)) return null;
                return { id: s.studentid, name: s.name, class: s.class, status: status, timestamp: now.toISOString(), location: 'Office' };
            }).filter(r => r !== null);
            if (records.length === 0) return alert("ไม่มีข้อมูลการสแกนในวันนี้");
            const res = await apiCall({ action: 'recordAttendanceUpdate', data: records });
            if (res.success) { alert("บันทึกสำเร็จ!"); location.reload(); }
        }

        async function apiCall(payload) {
            if (!gasWebAppUrl) return { success: false, error: "กรุณาตั้งค่า URL" };
            try {
                const res = await fetch(gasWebAppUrl, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                return data;
            } catch (e) { return { success: false, error: "Connection Error" }; }
        }

        function saveGasUrl() {
            const url = document.getElementById('gas-url').value;
            if (url.includes('google.com')) { 
                localStorage.setItem(GAS_URL_KEY, url); 
                location.reload(); 
            }
        }

        function stopCamera(id) {
            const v = document.getElementById(id);
            if (v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        }

        function openStudentModal() { 
            capturedImageData = null; 
            document.getElementById('preview-img').src = '';
            document.getElementById('student-modal').classList.remove('hidden'); 
        }
        function closeStudentModal() { 
            stopCamera('modal-video'); 
            document.getElementById('student-modal').classList.add('hidden'); 
        }
    </script>
</body>
</html>

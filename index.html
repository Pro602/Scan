<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THAISIAM INKJET - Attendance System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- ใช้ face-api.js จาก CDN ตามชุดไฟล์ที่แนบมา -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f1f5f9; height: 100vh; overflow: hidden; }
    
    /* สไตล์ Dashboard 5 คอลัมน์ */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      height: calc(100vh - 180px);
      padding: 0 20px;
    }
    .status-col {
      background: rgba(30, 41, 59, 0.5);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .col-title {
      padding: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px 12px 0 0;
    }
    .scroll-v {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    /* ซ่อน scrollbar */
    .scroll-v::-webkit-scrollbar { width: 0; }

    .emp-card {
      background: #1e293b;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid transparent;
    }

    /* กล้องสแกนหน้า */
    #video-container {
      position: relative;
      width: 280px;
      height: 210px;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      border: 3px solid #3b82f6;
    }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="flex justify-between items-center p-4 bg-slate-900 shadow-xl">
    <div class="flex items-center gap-4">
      <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" class="w-12 h-12 rounded-lg">
      <div>
        <h1 class="text-xl font-bold text-white uppercase">Thaisiam Inkjet</h1>
        <p class="text-xs text-blue-400">ระบบสแกนใบหน้าและสรุปผล Real-time</p>
      </div>
    </div>

    <!-- ส่วนของกล้องสแกนหน้า (วางไว้ด้านบนเพื่อให้เห็นตลอด) -->
    <div class="flex items-center gap-4 bg-slate-800 p-2 rounded-2xl border border-slate-700">
      <div id="video-container">
        <video id="video" autoplay muted></video>
        <div id="scan-feedback" class="absolute bottom-2 left-0 right-0 text-center text-[10px] bg-black/50 py-1">กำลังรอ AI...</div>
      </div>
      <div class="pr-4">
        <div id="clock" class="text-2xl font-bold text-white">00:00:00</div>
        <div id="date" class="text-[10px] text-slate-400">-- --- ----</div>
        <button onclick="startCamera()" id="btn-camera" class="mt-2 bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded-lg transition-all">เปิดกล้องสแกน</button>
      </div>
    </div>
  </header>

  <!-- สถิติย่อ -->
  <div class="flex gap-4 p-4 text-xs">
    <div class="bg-slate-800 px-4 py-2 rounded-full">มาแล้ว: <span id="stat-present" class="text-emerald-400 font-bold">0</span></div>
    <div class="bg-slate-800 px-4 py-2 rounded-full">ยังไม่มา: <span id="stat-missing" class="text-rose-400 font-bold">0</span></div>
    <div class="bg-slate-800 px-4 py-2 rounded-full">สาย: <span id="stat-late" class="text-amber-400 font-bold">0</span></div>
  </div>

  <!-- Dashboard 5 คอลัมน์ -->
  <main class="dashboard-grid">
    <!-- 1. มาปกติ -->
    <div class="status-col">
      <div class="col-title bg-emerald-500/20 text-emerald-400">มาปกติ (IN)</div>
      <div id="col-normal" class="scroll-v"></div>
    </div>
    <!-- 2. มาสาย -->
    <div class="status-col">
      <div class="col-title bg-amber-500/20 text-amber-400">มาสาย (IN)</div>
      <div id="col-late" class="scroll-v"></div>
    </div>
    <!-- 3. ออกงาน -->
    <div class="status-col">
      <div class="col-title bg-blue-500/20 text-blue-400">ออกงาน (OUT)</div>
      <div id="col-out" class="scroll-v"></div>
    </div>
    <!-- 4. ยังไม่มา -->
    <div class="status-col">
      <div class="col-title bg-rose-500/20 text-rose-400">ยังไม่มา</div>
      <div id="col-absent" class="scroll-v"></div>
    </div>
    <!-- 5. ลา / แจ้งล่วงหน้า -->
    <div class="status-col">
      <div class="col-title bg-purple-500/20 text-purple-400">ลา / ล่วงหน้า</div>
      <div id="col-leave" class="scroll-v"></div>
    </div>
  </main>

  <script>
    // ตั้งค่า API (ต้องตรงกับ Web App URL ของคุณ)
    const API_URL = 'https://script.google.com/macros/s/AKfycbzeHotjOIF6_P5N82ByzrVIPamzMu_JnL27mc551WBdAfzKwCxD3akItWtcSd7cPO5a/exec';
    
    let employees = [];
    let faceMatcher = null;
    let isCameraOn = false;

    // 1. เริ่มต้นระบบและโหลดโมเดล (ตามระบบที่คุณแนบมา)
    window.onload = async () => {
      updateTime();
      setInterval(updateTime, 1000);
      await loadModels();
      await fetchData();
      // อัปเดตข้อมูลทุก 1 นาที
      setInterval(fetchData, 60000);
    };

    function updateTime() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH');
      document.getElementById('date').innerText = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function loadModels() {
      const feedback = document.getElementById('scan-feedback');
      feedback.innerText = "กำลังโหลดโมเดล AI...";
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      feedback.innerText = "AI พร้อมแล้ว";
    }

    // 2. ดึงข้อมูลจาก Google Sheets มาแสดงผล Dashboard
    async function fetchData() {
      try {
        const response = await fetch(`${API_URL}?action=getStudents&t=${Date.now()}`);
        const result = await response.json();
        if (result.success) {
          employees = result.data;
          renderDashboard();
          prepareFaceMatcher();
        }
      } catch (e) { console.error("Data fetch error", e); }
    }

    function renderDashboard() {
      const cols = {
        normal: document.getElementById('col-normal'),
        late: document.getElementById('col-late'),
        out: document.getElementById('col-out'),
        absent: document.getElementById('col-absent'),
        leave: document.getElementById('col-leave')
      };

      // ล้างข้อมูลเก่า
      Object.values(cols).forEach(c => c.innerHTML = '');

      let countNormal = 0, countLate = 0, countOut = 0, countAbsent = 0, countLeave = 0;

      employees.forEach(emp => {
        const card = `
          <div class="emp-card">
            <img src="${emp.imagedatabase64 || 'https://www.w3schools.com/howto/img_avatar.png'}" class="w-8 h-8 rounded-full border border-slate-600">
            <div class="flex-1 overflow-hidden">
              <div class="text-[10px] font-bold truncate">${emp.name}</div>
              <div class="text-[8px] text-slate-400">${emp.timestamp || 'ยังไม่มีข้อมูล'}</div>
            </div>
          </div>
        `;

        if (emp.status === 'LEAVE') {
          cols.leave.innerHTML += card;
          countLeave++;
        } else if (emp.type === 'OUT') {
          cols.out.innerHTML += card;
          countOut++;
        } else if (emp.type === 'IN') {
          if (emp.isLate) {
            cols.late.innerHTML += card;
            countLate++;
          } else {
            cols.normal.innerHTML += card;
            countNormal++;
          }
        } else {
          cols.absent.innerHTML += card;
          countAbsent++;
        }
      });

      document.getElementById('stat-present').innerText = countNormal + countLate;
      document.getElementById('stat-missing').innerText = countAbsent;
      document.getElementById('stat-late').innerText = countLate;
    }

    // 3. ระบบสแกนหน้า (Logic เดียวกับ scan.html ที่คุณแนบมา)
    async function startCamera() {
      const video = document.getElementById('video');
      const btn = document.getElementById('btn-camera');
      if (isCameraOn) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
        isCameraOn = true;
        btn.innerText = "กล้องทำงานอยู่...";
        btn.classList.replace('bg-blue-600', 'bg-emerald-600');
        detectFace();
      } catch (err) {
        alert("ไม่สามารถเปิดกล้องได้: " + err);
      }
    }

    function prepareFaceMatcher() {
      const labeledDescriptors = employees
        .filter(e => e.faceDescriptor)
        .map(e => {
          try {
            const desc = new Float32Array(JSON.parse(e.faceDescriptor));
            return new faceapi.LabeledFaceDescriptors(e.studentid, [desc]);
          } catch(err) { return null; }
        })
        .filter(ld => ld !== null);

      if (labeledDescriptors.length > 0) {
        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5); // Threshold 0.5 ตามมาตรฐาน
      }
    }

    async function detectFace() {
      const video = document.getElementById('video');
      const feedback = document.getElementById('scan-feedback');
      
      if (!isCameraOn) return;

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

      if (detection && faceMatcher) {
        const match = faceMatcher.findBestMatch(detection.descriptor);
        if (match.label !== 'unknown') {
          feedback.innerText = `ยินดีต้อนรับ: ${match.label}`;
          feedback.classList.add('text-emerald-400');
          
          // บันทึกลงชีท (เรียก API เดิมของคุณ)
          await submitAttendance(match.label);
          
          // หยุดสแกนชั่วคราวเพื่อป้องกันการสแกนซ้ำ
          isCameraOn = false;
          setTimeout(() => { 
            isCameraOn = true; 
            feedback.classList.remove('text-emerald-400');
            detectFace(); 
          }, 5000); 
          return;
        } else {
          feedback.innerText = "ไม่พบข้อมูลในระบบ";
        }
      } else {
        feedback.innerText = "กรุณาขยับใบหน้ามาที่กล้อง";
      }

      requestAnimationFrame(detectFace);
    }

    async function submitAttendance(studentId) {
      // ค้นหาพนักงานเพื่อดูว่าล่าสุด IN หรือ OUT
      const emp = employees.find(e => e.studentid === studentId);
      const nextType = (emp && emp.type === 'IN') ? 'OUT' : 'IN';
      
      const payload = {
        action: 'logAttendance', // ใช้ชื่อ action ตาม code.gs ที่คุณแนบมา
        name: studentId,
        lat: 0,
        lng: 0
      };

      try {
        // ส่งแบบ POST ตามรูปแบบระบบเดิม
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors', // ตามข้อจำกัดของ GAS
          body: JSON.stringify(payload)
        });
        
        // รอแป๊บนึงแล้วดึงข้อมูลใหม่มาแสดงบน Dashboard
        setTimeout(fetchData, 2000);
      } catch (e) { console.error("Submit Error", e); }
    }
  </script>
</body>
</html>

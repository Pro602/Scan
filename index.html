<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนหน้าเข้าออกพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #1a1c1e; color: #f8fafc; }
        .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; overflow: hidden; border-radius: 0.75rem; }
        .logo-fade { animation: fadeInLogo 1.2s ease forwards; filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2)); }
        .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; }
        @keyframes fadeInLogo { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .scroll-container { display: flex; flex-direction: column; animation: scrollUp 25s linear infinite; }
        .scroll-container:hover { animation-play-state: paused; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .list-window { overflow: hidden; position: relative; height: 100%; }
        nav { background-color: #25282c !important; border-bottom: 1px solid #334155; }
        .tab-inactive { color: #94a3b8 !important; }
    </style>
</head>
<body>

    <nav class="shadow-lg sticky top-0 z-50 p-3">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-4">
                <div class="logo-wrapper">
                    <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-fade logo-spin w-12 h-12 object-contain rounded-xl border border-slate-700">
                </div>
                <div class="flex flex-col">
                    <span class="text-blue-400 font-bold text-2xl tracking-tight">THAISIAM INKJET</span>
                    <span class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-medium">Professional Attendance Recording Systems</span>
                </div>
            </div>
            <div class="flex bg-slate-800 p-1 rounded-2xl border border-slate-700 overflow-x-auto">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white transition-all whitespace-nowrap">Dashboard</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">สแกนใบหน้า</button>
                <button onclick="switchTab('leave')" id="tab-leave" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">แจ้งลา</button>
                <button onclick="switchTab('approve')" id="tab-approve" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">อนุมัติ</button>
                <button onclick="switchTab('manage')" id="tab-manage" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">ตั้งค่าพนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div id="content-dashboard" class="space-y-6">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                <h2 class="text-lg font-bold text-slate-200">สรุปการเข้างานวันนี้</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-600 text-sm text-white outline-none">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl border-b-4 border-emerald-500 text-center shadow-lg text-slate-800">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">มาปกติ</span>
                    <p id="stat-present" class="text-3xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-amber-500 text-center shadow-lg text-slate-800">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">มาสาย</span>
                    <p id="stat-late" class="text-3xl font-black text-amber-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-blue-500 text-center shadow-lg text-slate-800">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">ออกงาน</span>
                    <p id="stat-out" class="text-3xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-rose-500 text-center shadow-lg text-slate-800">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">ขาด/ยังไม่สแกน</span>
                    <p id="stat-absent" class="text-3xl font-black text-rose-600">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-emerald-900/30 border-b border-emerald-500/30 text-emerald-400 font-bold text-xs uppercase">มาปกติ</div>
                    <div class="list-window flex-grow"><div id="normal-list" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-amber-900/30 border-b border-amber-500/30 text-amber-400 font-bold text-xs uppercase">มาสาย</div>
                    <div class="list-window flex-grow"><div id="late-list" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-blue-900/30 border-b border-blue-500/30 text-blue-400 font-bold text-xs uppercase">ออกงาน</div>
                    <div class="list-window flex-grow"><div id="out-list" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-rose-900/30 border-b border-rose-500/30 text-rose-400 font-bold text-xs uppercase">ยังไม่สแกน/ลา</div>
                    <div class="list-window flex-grow"><div id="absent-list" class="p-2 space-y-2"></div></div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="hidden">
            <div class="max-w-md mx-auto bg-white p-6 rounded-[2.5rem] shadow-2xl text-slate-800">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">📍 เลือกสถานที่</label>
                    <select id="location-select" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-bold outline-none"></select>
                </div>
                <div class="relative aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-4 shadow-inner">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border mb-6">
                    <img id="res-img" class="w-16 h-16 rounded-xl object-cover border-2 border-white shadow hidden">
                    <div id="res-img-placeholder" class="w-16 h-16 bg-slate-200 rounded-xl flex items-center justify-center text-slate-400"><i data-lucide="user"></i></div>
                    <div>
                        <h3 id="res-name" class="text-lg font-bold">พร้อมสแกน...</h3>
                        <p id="res-id" class="text-blue-500 text-xs font-mono">STANDING BY</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-in" onclick="finishAttendance('IN')" class="bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">บันทึกเข้า (IN)</button>
                    <button id="btn-out" onclick="finishAttendance('OUT')" class="bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition-all">บันทึกออก (OUT)</button>
                </div>
            </div>
        </div>

        <div id="content-leave" class="hidden max-w-lg mx-auto bg-white p-6 rounded-[2rem] shadow-xl text-slate-800">
            <h2 class="text-xl font-bold mb-6 text-center">แจ้งลางาน</h2>
            <div class="space-y-4">
                <input type="text" id="leave-id" placeholder="รหัสพนักงาน" class="w-full border p-3 rounded-xl outline-none">
                <select id="leave-type" class="w-full border p-3 rounded-xl outline-none">
                    <option value="ลาป่วย">ลาป่วย</option>
                    <option value="ลากิจ">ลากิจ</option>
                    <option value="ลาพักร้อน">ลาพักร้อน</option>
                </select>
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="leave-start" class="w-full border p-3 rounded-xl outline-none">
                    <input type="date" id="leave-end" class="w-full border p-3 rounded-xl outline-none">
                </div>
                <textarea id="leave-reason" placeholder="เหตุผลการลา" class="w-full border p-3 rounded-xl outline-none h-24"></textarea>
                <button onclick="submitLeave()" class="w-full bg-rose-600 text-white py-4 rounded-xl font-bold shadow-lg">ยืนยันการลา</button>
            </div>
        </div>

        <div id="content-approve" class="hidden space-y-4">
            <h2 class="text-xl font-bold">รายการรออนุมัติ</h2>
            <div id="leave-approve-list" class="space-y-3"></div>
        </div>

        <div id="content-manage" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">รายชื่อพนักงาน</h2>
                <button onclick="openAddModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold">+ เพิ่มพนักงาน</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="employee-list"></div>
        </div>
    </main>

    <div id="student-modal" class="fixed inset-0 bg-slate-900/90 z-[400] flex items-center justify-center hidden p-4">
        <div class="bg-white p-6 rounded-[2rem] max-w-sm w-full shadow-2xl space-y-4 text-slate-800">
            <h3 class="text-lg font-bold text-center">ข้อมูลพนักงานใหม่</h3>
            <div class="space-y-3">
                <input type="text" id="modal-id" placeholder="รหัสพนักงาน" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="modal-name" placeholder="ชื่อ-นามสกุล" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="modal-class" placeholder="แผนก/Class" class="w-full border p-3 rounded-xl outline-none">
                
                <div class="flex gap-2">
                    <button onclick="startModalCamera()" class="flex-1 bg-slate-100 py-2 rounded-xl text-xs font-bold border"><i data-lucide="camera" class="inline w-3 h-3 mr-1"></i>ถ่ายรูป</button>
                    <label class="flex-1 bg-slate-100 py-2 rounded-xl text-xs font-bold border text-center cursor-pointer">
                        <i data-lucide="upload" class="inline w-3 h-3 mr-1"></i>อัปโหลดรูป
                        <input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                </div>

                <div class="relative aspect-square bg-slate-100 rounded-xl overflow-hidden border">
                    <video id="modal-video" class="w-full h-full object-cover hidden" autoplay muted playsinline></video>
                    <img id="preview-img" class="w-full h-full object-cover hidden">
                    <button id="btn-snap" onclick="snapPhoto()" class="absolute bottom-2 left-1/2 -translate-x-1/2 bg-rose-600 text-white p-3 rounded-full hidden"><i data-lucide="aperture"></i></button>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="saveStudent()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">บันทึก</button>
                <button onclick="closeStudentModal()" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-slate-900/90 z-[300] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-[2rem] max-w-xs w-full text-slate-800 shadow-2xl space-y-4">
            <h3 class="text-lg font-bold text-center">เข้าสู่ระบบ</h3>
            <input type="text" id="login-user" placeholder="Username" class="w-full border p-3 rounded-xl outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full border p-3 rounded-xl outline-none">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Login</button>
            <button onclick="closeLoginModal()" class="w-full text-slate-400 text-sm">ยกเลิก</button>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>
    <audio id="snd-ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycby9t947sFIvKCyxoLrFjLu0nNSGo95rdgFLarIfIVanE7kCKEDfglqgikUZCeFC_JAj/exec";
    let students = [], attendance = [], locationList = [], leaves = [], faceMatcher = null;
    let isLoggedIn = false, pendingTab = null, capturedImg = null;
    const AUTH = { "Weera": "TS001", "Jang": "TS002" };

    window.onload = async () => {
        lucide.createIcons();
        document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
        await loadAllData();
        await initFaceAPI();
    };

    async function apiCall(p) {
        try { const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)}); return await r.json(); } 
        catch(e) { return {success:false}; }
    }

    async function loadAllData() {
        const [s, a, l, v] = await Promise.all([
            apiCall({action:'getStudents'}), apiCall({action:'getAttendance'}), 
            apiCall({action:'getLocations'}), apiCall({action:'getLeaves'})
        ]);
        if(s.success) students = s.data;
        if(a.success) attendance = a.data;
        if(l.success) { locationList = l.data; renderLocationDropdown(); }
        if(v.success) leaves = v.data;
        renderDashboard();
        renderManage();
        renderApprove();
    }

    async function initFaceAPI() {
        const URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(URL)
        ]);
        await updateFaceMatcher();
    }

    async function updateFaceMatcher() {
        const labeled = await Promise.all(students.map(async s => {
            if(!s.imagedatabase64) return null;
            const img = await faceapi.fetchImage(s.imagedatabase64);
            const desc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            return desc ? new faceapi.LabeledFaceDescriptors(String(s.studentid), [desc.descriptor]) : null;
        }));
        const valid = labeled.filter(d => d !== null);
        if(valid.length > 0) faceMatcher = new faceapi.FaceMatcher(valid, 0.55);
    }

    // --- DASHBOARD RENDER (FIXED ตามภาพที่ส่งให้) ---
    function renderDashboard() {
        const dateStr = document.getElementById('dashboard-date').value;
        const daily = attendance.filter(a => a.timestamp && a.timestamp.includes(dateStr));
        const checkedIds = new Set(daily.filter(a => a.type === 'IN').map(a => String(a.id)));
        
        const lists = { norm: document.getElementById('normal-list'), late: document.getElementById('late-list'), out: document.getElementById('out-list'), abs: document.getElementById('absent-list') };
        Object.values(lists).forEach(l => { if(l) { l.innerHTML = ''; l.classList.remove('scroll-container'); }});

        let cIn = 0, cLate = 0, cOut = 0;

        daily.forEach(a => {
            const s = students.find(x => String(x.studentid) === String(a.id));
            const time = a.timestamp.split(' ')[1] || '';
            const gMap = (a.lat && a.lng) ? `https://www.google.com/maps?q=${a.lat},${a.lng}` : '#';
            
            const card = `
                <div class="bg-white p-2 rounded-xl border border-slate-200 shadow-sm text-slate-800">
                    <div class="flex items-center gap-3">
                        <img src="${s?.imagedatabase64 || ''}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="flex-grow">
                            <p class="text-[11px] font-bold leading-none">${a.name}</p>
                            <p class="text-[9px] text-slate-500 font-medium mt-0.5">${a.location_name || 'ไม่ทราบสถานที่'}</p>
                            <div class="flex items-center justify-between mt-1">
                                <span class="text-[10px] text-blue-600 font-mono font-bold">${time} น.</span>
                                ${a.lat ? `<a href="${gMap}" target="_blank" class="text-emerald-600 flex items-center hover:scale-110">
                                    <i data-lucide="map-pin" class="w-3 h-3"></i><span class="text-[8px] font-bold ml-0.5">พิกัด</span>
                                </a>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;

            if(a.type === 'OUT') { if(lists.out) lists.out.innerHTML += card; cOut++; }
            else if(a.status === 'สาย') { if(lists.late) lists.late.innerHTML += card; cLate++; }
            else { if(lists.norm) lists.norm.innerHTML += card; cIn++; }
        });

        students.forEach(s => {
            if(!checkedIds.has(String(s.studentid))) {
                lists.abs.innerHTML += `<div class="bg-white p-2 rounded-xl border border-slate-200 shadow-sm opacity-60"><div class="flex items-center gap-3"><img src="${s.imagedatabase64}" class="w-10 h-10 rounded-lg object-cover grayscale"><p class="text-[10px] font-bold text-slate-400">${s.name}</p></div></div>`;
            }
        });

        document.getElementById('stat-present').innerText = cIn;
        document.getElementById('stat-late').innerText = cLate;
        document.getElementById('stat-out').innerText = cOut;
        document.getElementById('stat-absent').innerText = students.length - checkedIds.size;

        Object.keys(lists).forEach(k => { if(lists[k] && lists[k].children.length > 7) { lists[k].innerHTML += lists[k].innerHTML; lists[k].classList.add('scroll-container'); } });
        lucide.createIcons();
    }

    // --- MANAGE & FILE UPLOAD (เพิ่มฟังก์ชันอัปโหลด) ---
    function handleFileUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            capturedImg = ev.target.result;
            const preview = document.getElementById('preview-img');
            preview.src = capturedImg;
            preview.classList.remove('hidden');
            document.getElementById('modal-video').classList.add('hidden');
            document.getElementById('btn-snap').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    // --- LEAVE & APPROVE (คงเดิม 100% ตามต้นฉบับ) ---
    async function submitLeave() {
        const id = document.getElementById('leave-id').value, type = document.getElementById('leave-type').value;
        const start = document.getElementById('leave-start').value, end = document.getElementById('leave-end').value;
        const reason = document.getElementById('leave-reason').value;
        if(!id || !start || !end) return alert("Error");
        const res = await apiCall({action:'addLeave', data:{id, type, start, end, reason}});
        if(res.success) { alert("Success"); location.reload(); } else alert("Error");
    }

    function renderApprove() {
        const list = document.getElementById('leave-approve-list');
        list.innerHTML = leaves.filter(l => l.status === 'Pending').map(l => `
            <div class="bg-white p-4 rounded-2xl shadow-md text-slate-800 flex justify-between items-center">
                <div><p class="font-bold">${l.name} (${l.type})</p><p class="text-xs text-slate-500">${l.start} ถึง ${l.end}</p></div>
                <div class="flex gap-2">
                    <button onclick="updateLeave('${l.row}', 'Approved')" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-xs">อนุมัติ</button>
                    <button onclick="updateLeave('${l.row}', 'Rejected')" class="bg-rose-500 text-white px-3 py-1 rounded-lg text-xs">ปฏิเสธ</button>
                </div>
            </div>`).join('');
    }

    async function updateLeave(row, status) {
        const res = await apiCall({action:'updateLeaveStatus', data:{row, status}});
        if(res.success) location.reload(); else alert("Error");
    }

    // --- UI & SYSTEM LOGIC (คงเดิม) ---
    function switchTab(t) {
        if((t==='approve' || t==='manage') && !isLoggedIn) { pendingTab = t; document.getElementById('login-modal').classList.remove('hidden'); return; }
        document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(`content-${t}`).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => { b.classList.replace('bg-blue-600', 'tab-inactive'); b.classList.remove('text-white', 'font-bold'); });
        const active = document.getElementById(`tab-${t}`);
        active.classList.replace('tab-inactive', 'bg-blue-600'); active.classList.add('text-white', 'font-bold');
        if(t==='scan') startCamera('video').then(() => setTimeout(startDetector, 1000)); else stopCamera('video');
    }

    async function startCamera(id) { try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}); document.getElementById(id).srcObject = s; } catch(e) { console.log(e); } }
    function stopCamera(id) { const v = document.getElementById(id); if(v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop()); }

    async function startDetector() {
        const video = document.getElementById('video'), canvas = document.getElementById('overlay');
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(canvas, displaySize);
        const loop = async () => {
            if(video.paused || video.ended || !faceMatcher) return setTimeout(loop, 500);
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
            resized.forEach(res => {
                const match = faceMatcher.findBestMatch(res.descriptor);
                const s = students.find(x => String(x.studentid) === String(match.label));
                if(s && match.distance < 0.45) {
                    document.getElementById('res-name').innerText = s.name;
                    document.getElementById('res-id').innerText = s.studentid;
                    document.getElementById('res-img').src = s.imagedatabase64;
                    document.getElementById('res-img').classList.remove('hidden');
                    document.getElementById('res-img-placeholder').classList.add('hidden');
                    new faceapi.draw.DrawBox(res.detection.box, {label: s.name}).draw(canvas);
                }
            });
            setTimeout(loop, 200);
        };
        loop();
    }

    async function finishAttendance(type) {
        const id = document.getElementById('res-id').innerText, loc = document.getElementById('location-select').value;
        if(id === 'STANDING BY' || !loc) return alert("Error");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const res = await apiCall({action:'addAttendance', data:{id, type, location_name:loc, lat:pos.coords.latitude, lng:pos.coords.longitude}});
            if(res.success) { document.getElementById('snd-ok').play(); alert("Success"); location.reload(); } else alert("Error");
        }, () => alert("GPS Error"), {enableHighAccuracy:true});
    }

    function renderManage() {
        const container = document.getElementById('employee-list');
        container.innerHTML = students.map(s => `
            <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-md text-slate-800">
                <div class="flex items-center space-x-3"><img src="${s.imagedatabase64}" class="w-12 h-12 rounded-xl object-cover"><div><p class="font-bold text-sm">${s.name}</p><p class="text-xs text-slate-400">ID: ${s.studentid}</p></div></div>
                <button onclick="deleteStudent('${s.studentid}')" class="text-rose-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>`).join('');
        lucide.createIcons();
    }

    async function deleteStudent(id) { if(confirm("Confirm?")) { const res = await apiCall({action:'deleteStudent', data:{studentid:id}}); if(res.success) location.reload(); } }
    function checkLogin() { const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value; if(AUTH[u] === p) { isLoggedIn = true; document.getElementById('login-modal').classList.add('hidden'); switchTab(pendingTab); } else alert("Error"); }
    function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
    function startModalCamera() { startCamera('modal-video'); document.getElementById('modal-video').classList.remove('hidden'); document.getElementById('preview-img').classList.add('hidden'); document.getElementById('btn-snap').classList.remove('hidden'); }
    function snapPhoto() { const v = document.getElementById('modal-video'), c = document.getElementById('capture-canvas'); c.width = 400; c.height = 400; c.getContext('2d').drawImage(v,0,0,400,400); capturedImg = c.toDataURL('image/jpeg', 0.8); document.getElementById('preview-img').src = capturedImg; document.getElementById('preview-img').classList.remove('hidden'); v.classList.add('hidden'); stopCamera('modal-video'); document.getElementById('btn-snap').classList.add('hidden'); }
    async function saveStudent() { const sId = document.getElementById('modal-id').value, sName = document.getElementById('modal-name').value, sClass = document.getElementById('modal-class').value; if(!capturedImg || !sId || !sName) return alert("Error"); const res = await apiCall({ action: 'addStudent', data: {studentid: sId, name: sName, class: sClass, imagedatabase64: capturedImg} }); if(res.success) location.reload(); else alert("Error"); }
    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); stopCamera('modal-video'); }
    function openAddModal() { document.getElementById('student-modal').classList.remove('hidden'); }
    function renderLocationDropdown() { const sel = document.getElementById('location-select'); sel.innerHTML = '<option value="">-- เลือกสถานที่ --</option>' + locationList.map(l => `<option value="${l.name}">${l.name}</option>`).join(''); }
</script>
</body>
</html>

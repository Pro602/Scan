<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลา THAISIAM - Face Scan & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow: hidden; height: 100vh; }
        
        /* Dashboard Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            height: calc(100vh - 140px);
            padding: 0 20px 20px 20px;
        }

        .col-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .col-header {
            padding: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
        }

        /* Auto Scroll Animation */
        .scroll-area {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .scroll-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            animation: scrollLoop 60s linear infinite;
        }

        .scroll-content:hover { animation-play-state: paused; }

        @keyframes scrollLoop {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .emp-item {
            background: rgba(15, 23, 42, 0.8);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .emp-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #334155; }

        /* Modal / Overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .scan-window {
            width: 90%;
            max-width: 500px;
            background: #1e293b;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #video-feed {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            object-fit: cover;
            background: #000;
            transform: scaleX(-1);
            border: 4px solid #3b82f6;
        }

        .btn-nav {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-nav:hover { background: rgba(255,255,255,0.1); }
        .btn-nav.active { background: #2563eb; color: white; }

    </style>
</head>
<body>

    <!-- Top Navigation -->
    <header class="flex items-center justify-between px-8 py-4 bg-slate-900/50">
        <div class="flex items-center gap-4">
            <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" class="h-10 w-10 rounded-lg shadow-lg">
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">THAISIAM INKJET</h1>
                <p class="text-[10px] text-blue-400 uppercase tracking-widest font-semibold">Face Scan Dashboard</p>
            </div>
        </div>

        <div class="flex gap-2 p-1 bg-slate-800 rounded-xl">
            <button class="btn-nav active"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="toggleScanModal(true)" class="btn-nav"><i data-lucide="camera" class="w-4 h-4"></i> เริ่มสแกนหน้า</button>
            <button onclick="openManualInput()" class="btn-nav"><i data-lucide="keypad" class="w-4 h-4"></i> ป้อนรหัส</button>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-slate-400 uppercase">วันที่ปัจจุบัน</p>
                <p id="display-date" class="text-sm font-bold text-white">--/--/----</p>
            </div>
            <div id="connection-status" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
        </div>
    </header>

    <!-- Stat Summary -->
    <div class="px-8 py-4 flex gap-4">
        <div class="bg-slate-800/50 px-4 py-2 rounded-lg border border-white/5">
            <span class="text-[10px] text-slate-400">พนักงานทั้งหมด: </span>
            <span id="stat-total" class="font-bold text-white ml-2">0</span>
        </div>
    </div>

    <!-- Main Dashboard Grid -->
    <main class="grid-container">
        <!-- 1. มาปกติ -->
        <div class="col-card">
            <div class="col-header bg-emerald-500/20 text-emerald-400">
                <span>มาปกติ (IN)</span>
                <span id="count-normal" class="bg-emerald-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
            </div>
            <div class="scroll-area">
                <div id="list-normal" class="scroll-content"></div>
            </div>
        </div>

        <!-- 2. มาสาย -->
        <div class="col-card">
            <div class="col-header bg-amber-500/20 text-amber-400">
                <span>มาสาย (IN)</span>
                <span id="count-late" class="bg-amber-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
            </div>
            <div class="scroll-area">
                <div id="list-late" class="scroll-content"></div>
            </div>
        </div>

        <!-- 3. ลงเวลาออก -->
        <div class="col-card">
            <div class="col-header bg-blue-500/20 text-blue-400">
                <span>ลงเวลาออก (OUT)</span>
                <span id="count-out" class="bg-blue-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
            </div>
            <div class="scroll-area">
                <div id="list-out" class="scroll-content"></div>
            </div>
        </div>

        <!-- 4. ยังไม่ลงเวลา -->
        <div class="col-card">
            <div class="col-header bg-rose-500/20 text-rose-400">
                <span>ยังไม่ลงเวลางาน</span>
                <span id="count-absent" class="bg-rose-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
            </div>
            <div class="scroll-area">
                <div id="list-absent" class="scroll-content"></div>
            </div>
        </div>

        <!-- 5. ล่วงหน้า/ลา -->
        <div class="col-card">
            <div class="col-header bg-purple-500/20 text-purple-400">
                <span>พนักงานล่วงหน้า (LEAVE)</span>
                <span id="count-leave" class="bg-purple-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
            </div>
            <div class="scroll-area">
                <div id="list-leave" class="scroll-content"></div>
            </div>
        </div>
    </main>

    <!-- Face Scan Modal -->
    <div id="scan-modal" class="overlay">
        <div class="scan-window">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">สแกนใบหน้าเข้างาน</h3>
                <button onclick="toggleScanModal(false)" class="text-slate-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="relative mb-6">
                <video id="video-feed" autoplay muted playsinline></video>
                <div id="scan-line" class="absolute top-0 left-0 w-full h-1 bg-blue-500/50 shadow-[0_0_15px_#3b82f6] hidden"></div>
                <div id="scan-status" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/60 px-4 py-1 rounded-full text-xs text-blue-400 border border-blue-500/30">
                    กำลังเตรียมระบบ AI...
                </div>
            </div>

            <p class="text-slate-400 text-sm mb-2">กรุณามองตรงไปที่กล้อง</p>
        </div>
    </div>

    <!-- Manual Input Modal -->
    <div id="manual-modal" class="overlay">
        <div class="bg-white p-8 rounded-[32px] w-[380px] text-center">
            <h3 class="text-slate-900 font-bold text-xl mb-6">ป้อนรหัสพนักงาน</h3>
            <input type="text" id="manual-id" placeholder="STUDENT ID" class="w-full p-4 text-3xl font-black text-center bg-slate-100 border-2 border-slate-200 rounded-2xl text-slate-900 mb-6 outline-none focus:border-blue-500">
            <button onclick="submitManual()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg mb-4">ยืนยัน</button>
            <button onclick="closeManual()" class="text-slate-400 text-sm">ยกเลิก</button>
        </div>
    </div>

    <script>
        const GAS_API = 'https://script.google.com/macros/s/AKfycbzeHotjOIF6_P5N82ByzrVIPamzMu_JnL27mc551WBdAfzKwCxD3akItWtcSd7cPO5a/exec';
        let employees = [];
        let faceMatcher = null;
        let isAiReady = false;

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('display-date').innerText = new Date().toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
            
            await initDashboard();
            loadAiModels();
        };

        // --- DASHBOARD LOGIC ---
        async function initDashboard() {
            try {
                const res = await fetch(`${GAS_API}?action=getStudents&t=${Date.now()}`);
                const result = await res.json();
                if (result.success) {
                    employees = result.data;
                    renderDashboard(employees);
                }
            } catch (e) { console.error("Fetch Error:", e); }
        }

        function renderDashboard(data) {
            const types = {
                normal: data.filter(e => e.type === 'IN' && !e.isLate),
                late: data.filter(e => e.type === 'IN' && e.isLate),
                out: data.filter(e => e.type === 'OUT'),
                absent: data.filter(e => !e.type && e.status !== 'LEAVE'),
                leave: data.filter(e => e.status === 'LEAVE')
            };

            Object.keys(types).forEach(key => {
                const list = document.getElementById(`list-${key}`);
                const count = document.getElementById(`count-${key}`);
                count.innerText = types[key].length;
                
                const itemsHtml = types[key].map(e => `
                    <div class="emp-item">
                        <img src="${e.imagedatabase64 || 'https://via.placeholder.com/40'}" class="emp-img" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-bold text-white truncate">${e.name}</p>
                            <div class="flex justify-between text-[9px] text-slate-500">
                                <span>ID: ${e.studentid}</span>
                                <span class="text-blue-400">${e.timestamp ? e.timestamp.split(' ')[1] : '--:--'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                list.innerHTML = itemsHtml + itemsHtml; // Double for infinite scroll
            });
            document.getElementById('stat-total').innerText = data.length;
        }

        // --- FACE SCAN LOGIC (Using your provided structure) ---
        async function loadAiModels() {
            const status = document.getElementById('scan-status');
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                // Prepare Face Matcher from employee data (if descriptors exist)
                const labeledDescriptors = employees
                    .filter(e => e.faceDescriptor)
                    .map(e => new faceapi.LabeledFaceDescriptors(e.studentid, [new Float32Array(JSON.parse(e.faceDescriptor))]));
                
                if (labeledDescriptors.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
                }
                
                isAiReady = true;
                status.innerText = "AI พร้อมทำงาน";
            } catch (e) {
                status.innerText = "โหลด AI ล้มเหลว";
                console.error(e);
            }
        }

        async function toggleScanModal(show) {
            const modal = document.getElementById('scan-modal');
            const video = document.getElementById('video-feed');
            
            if (show) {
                modal.style.display = 'flex';
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                startDetection();
            } else {
                modal.style.display = 'none';
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }
        }

        async function startDetection() {
            if (!isAiReady) return;
            const video = document.getElementById('video-feed');
            const status = document.getElementById('scan-status');
            document.getElementById('scan-line').classList.remove('hidden');

            const interval = setInterval(async () => {
                if (document.getElementById('scan-modal').style.display === 'none') {
                    clearInterval(interval);
                    return;
                }

                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (detection && faceMatcher) {
                    const match = faceMatcher.findBestMatch(detection.descriptor);
                    if (match.label !== 'unknown') {
                        clearInterval(interval);
                        status.innerText = `พบคุณ ${match.label}! กำลังบันทึก...`;
                        status.classList.replace('text-blue-400', 'text-emerald-400');
                        await recordTime(match.label);
                        setTimeout(() => toggleScanModal(false), 2000);
                    } else {
                        status.innerText = "ไม่พบข้อมูลพนักงาน...";
                    }
                }
            }, 500);
        }

        // --- DATA RECORDING ---
        async function recordTime(studentId) {
            const emp = employees.find(e => e.studentid === studentId);
            const type = (emp && emp.type === 'IN') ? 'OUT' : 'IN';
            
            // Get Location
            const pos = await new Promise(resolve => navigator.geolocation.getCurrentPosition(resolve, () => resolve({coords:{latitude:0,longitude:0}})));
            
            const payload = {
                action: 'recordAttendanceUpdate',
                data: [{
                    id: studentId,
                    type: type,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    timestamp: new Date().toLocaleString('th-TH')
                }]
            };

            try {
                await fetch(GAS_API, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                // Small delay to allow GAS to finish then refresh
                setTimeout(initDashboard, 1500);
            } catch (e) { console.error("Record Error:", e); }
        }

        function openManualInput() { document.getElementById('manual-modal').style.display = 'flex'; document.getElementById('manual-id').focus(); }
        function closeManual() { document.getElementById('manual-modal').style.display = 'none'; document.getElementById('manual-id').value = ''; }
        
        async function submitManual() {
            const id = document.getElementById('manual-id').value.trim();
            if (id) {
                await recordTime(id);
                closeManual();
            }
        }
    </script>
</body>
</html>

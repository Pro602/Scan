<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* ===== เอฟเฟกต์โลโก้ 3D Spin & Glow ===== */
        .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; }
        .logo-fade { animation: fadeInLogo 1.2s ease forwards; filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2)); }
        .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; }
        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(-10px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes spin360 {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        .logo-glow::after {
            content: ""; position: absolute; top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine 3s ease-in-out infinite;
        }
        @keyframes shine {
            0% { left: -75%; opacity: 0; }
            40% { left: 100%; opacity: 0.6; }
            100% { left: 100%; opacity: 0; }
        }

        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50 p-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="logo-wrapper logo-glow">
                    <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" class="logo-fade logo-spin w-14 h-14 object-contain rounded-xl">
                </div>
                <div class="flex flex-col">
                    <span class="text-blue-800 font-bold text-2xl tracking-tight">THAISIAM INKJET</span>
                    <span class="text-slate-400 text-[10px] uppercase tracking-[0.2em] font-medium">Production Systems</span>
                </div>
            </div>
            
            <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md">Dashboard</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-6 py-2.5 rounded-xl text-sm font-medium text-slate-600">เช็คชื่อ</button>
                <button onclick="switchTab('manage')" id="tab-manage" class="px-6 py-2.5 rounded-xl text-sm font-medium text-slate-600">พนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div id="content-dashboard" class="tab-content space-y-6">
            <div class="flex justify-between items-end border-b pb-4">
                <h2 class="text-xl font-bold text-slate-700">สรุปการเข้างานพนักงาน</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="border p-2 rounded-xl text-sm font-bold">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-2xl border-b-4 border-emerald-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs">มาปกติ</span>
                    <p id="stat-present" class="text-3xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-amber-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs">มาสาย</span>
                    <p id="stat-late" class="text-3xl font-black text-amber-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-rose-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs">ยังไม่สแกน</span>
                    <p id="stat-absent" class="text-3xl font-black text-rose-600">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                <div class="bg-white rounded-2xl border overflow-hidden h-[500px] flex flex-col">
                    <div class="p-3 bg-emerald-50 font-bold text-xs">มาปกติ</div>
                    <div id="normal-list" class="p-2 space-y-1 overflow-y-auto flex-grow"></div>
                </div>
                <div class="bg-white rounded-2xl border overflow-hidden h-[500px] flex flex-col">
                    <div class="p-3 bg-amber-50 font-bold text-xs">มาสาย</div>
                    <div id="late-list-display" class="p-2 space-y-1 overflow-y-auto flex-grow"></div>
                </div>
                <div class="bg-white rounded-2xl border overflow-hidden h-[500px] flex flex-col">
                    <div class="p-3 bg-rose-50 font-bold text-xs">ยังไม่เช็คชื่อ</div>
                    <div id="absent-list" class="p-2 space-y-1 overflow-y-auto flex-grow"></div>
                </div>
                <div class="bg-white rounded-2xl border overflow-hidden h-[500px] flex flex-col">
                    <div class="p-3 bg-blue-50 font-bold text-xs">สแกนล่าสุด (ออก)</div>
                    <div id="latest-scan-list" class="p-2 space-y-1 overflow-y-auto flex-grow"></div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="tab-content hidden">
            <div class="max-w-md mx-auto bg-white p-6 rounded-[2.5rem] shadow-2xl border">
                <div class="relative aspect-video bg-slate-900 rounded-2xl overflow-hidden">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div id="scan-result" class="mt-6 flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border">
                    <img id="res-img" class="w-16 h-16 rounded-xl object-cover hidden">
                    <div>
                        <h3 id="res-name" class="text-lg font-bold">พร้อมสแกน...</h3>
                        <p id="res-id" class="text-blue-500 text-xs font-mono">ID: -</p>
                    </div>
                </div>
                <button id="btn-submit" onclick="finishAttendance()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-xl font-bold">บันทึกข้อมูลเข้า Sheets</button>
            </div>
        </div>

        <div id="content-manage" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">รายชื่อพนักงาน</h2>
                <button onclick="openAddModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">+ เพิ่มพนักงาน</button>
            </div>
            <div class="bg-white rounded-2xl border overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50">
                        <tr><th class="p-4">รูป</th><th class="p-4">รหัส</th><th class="p-4">ชื่อ</th><th class="p-4">แผนก</th><th class="p-4">จัดการ</th></tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0Od_-aT7INphDUKlx7OB6NhgRH9O2gb6obyB2pXU2VA9g3takchN20-XhyMt8KJ1N/exec";
        let students = [], attendance = [], faceMatcher = null, scanned = new Map();

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
            await loadAllData();
            await initFaceAPI();
        };

        async function loadAllData() {
            const [sRes, aRes] = await Promise.all([
                apiCall({action:'getStudents'}), 
                apiCall({action:'getAttendance'})
            ]);
            if(sRes.success) students = sRes.data;
            if(aRes.success) attendance = aRes.data;
            renderStudentTable();
            renderDashboard();
        }

        function switchTab(tab) {
            // 1. ซ่อนทุกหน้าที่มี class tab-content
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            // 2. แสดงหน้าที่เลือก
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            
            // 3. ปรับสีปุ่ม
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'font-bold', 'shadow-md');
                btn.classList.add('text-slate-600');
            });
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.add('bg-blue-600', 'text-white', 'font-bold', 'shadow-md');
            
            if (tab === 'scan') { startCamera('video'); setTimeout(startDetector, 1000); }
            else { stopCamera('video'); }
        }

        async function apiCall(p) {
            try {
                const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)});
                return await r.json();
            } catch(e) { console.error(e); return {success:false}; }
        }

        function renderDashboard() {
            const dateInput = document.getElementById('dashboard-date').value;
            const daily = attendance.filter(a => {
                const rowDate = a.timestamp ? a.timestamp.split(' ')[0] : "";
                return rowDate === dateInput;
            });

            const checkedIds = new Set(daily.map(a => String(a.id)));
            const normL = document.getElementById('normal-list');
            const lateL = document.getElementById('late-list-display');
            const absL = document.getElementById('absent-list');
            const outL = document.getElementById('latest-scan-list');

            normL.innerHTML = ''; lateL.innerHTML = ''; absL.innerHTML = ''; outL.innerHTML = '';
            let countNormal = 0, countLate = 0;

            daily.forEach(a => {
                const s = students.find(x => String(x.studentid) === String(a.id));
                const timeStr = a.timestamp.split(' ')[1]?.substring(0, 5) || "--:--";
                const html = `<div class="flex items-center gap-2 bg-white p-2 rounded-xl border mb-1">
                    <img src="${s?.imagedatabase64 || ''}" class="w-8 h-8 rounded-lg object-cover">
                    <div><p class="font-bold text-[11px]">${a.name}</p><p class="text-[10px] text-slate-400">${timeStr}</p></div>
                </div>`;
                if(a.status === 'มาปกติ') { normL.innerHTML += html; countNormal++; }
                else { lateL.innerHTML += html; countLate++; }
            });

            students.filter(s => !checkedIds.has(String(s.studentid))).forEach(s => {
                absL.innerHTML += `<div class="flex items-center gap-2 opacity-50 bg-white p-2 rounded-xl border mb-1">
                    <img src="${s.imagedatabase64}" class="w-8 h-8 rounded-lg object-cover">
                    <p class="font-bold text-[11px]">${s.name}</p>
                </div>`;
            });

            document.getElementById('stat-present').innerText = countNormal;
            document.getElementById('stat-late').innerText = countLate;
            document.getElementById('stat-absent').innerText = students.length - checkedIds.size;
        }

        function renderStudentTable() {
            document.getElementById('student-table-body').innerHTML = students.map(s => `
                <tr>
                    <td class="p-4"><img src="${s.imagedatabase64}" class="w-10 h-10 rounded-lg object-cover"></td>
                    <td class="p-4 font-mono text-xs">${s.studentid}</td>
                    <td class="p-4 font-bold">${s.name}</td>
                    <td class="p-4 text-slate-400">${s.class || '-'}</td>
                    <td class="p-4"><button onclick="deleteStudent(${s.rowIndex})" class="text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        }

        // [ส่วน Logic อื่นๆ เช่น FaceAPI, Camera ให้คงเดิมได้เลยครับ]
    </script>
</body>
</html>

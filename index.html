<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; }
        @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .tab-content { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50 p-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="logo-wrapper">
                    <img src="https://www.google.com/s2/favicons?domain=google.com&sz=64" class="logo-spin w-12 h-12 object-contain rounded-xl shadow-md">
                </div>
                <div class="flex flex-col">
                    <span class="text-blue-800 font-bold text-xl tracking-tight">THAISIAM INKJET</span>
                    <span class="text-slate-400 text-[10px] uppercase font-medium">Production Systems</span>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl border">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-lg text-sm font-bold bg-blue-600 text-white shadow-sm">Dashboard</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600">เช็คชื่อ</button>
                <button onclick="switchTab('manage')" id="tab-manage" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600">พนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div id="content-dashboard" class="tab-content space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <h2 class="text-lg font-bold text-slate-700">สรุปการเข้างานพนักงาน</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="border p-2 rounded-xl text-sm font-bold">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-2xl border-b-4 border-emerald-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs uppercase">มาปกติ</span>
                    <p id="stat-present" class="text-3xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-amber-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs uppercase">มาสาย</span>
                    <p id="stat-late" class="text-3xl font-black text-amber-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-rose-500 shadow-sm flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-xs uppercase">ยังไม่สแกน</span>
                    <p id="stat-absent" class="text-3xl font-black text-rose-600">0</p>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="bg-white rounded-2xl border overflow-hidden h-[400px] flex flex-col shadow-sm">
                    <div class="p-3 bg-emerald-50 font-bold text-xs text-emerald-700">รายชื่อ: มาปกติ</div>
                    <div id="normal-list" class="p-2 overflow-y-auto flex-grow custom-scrollbar"></div>
                </div>
                <div class="bg-white rounded-2xl border overflow-hidden h-[400px] flex flex-col shadow-sm">
                    <div class="p-3 bg-amber-50 font-bold text-xs text-amber-700">รายชื่อ: มาสาย</div>
                    <div id="late-list-display" class="p-2 overflow-y-auto flex-grow custom-scrollbar"></div>
                </div>
                <div class="bg-white rounded-2xl border overflow-hidden h-[400px] flex flex-col shadow-sm">
                    <div class="p-3 bg-rose-50 font-bold text-xs text-rose-700">รายชื่อ: ยังไม่เช็คชื่อ</div>
                    <div id="absent-list" class="p-2 overflow-y-auto flex-grow custom-scrollbar"></div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="tab-content hidden">
            <div class="max-w-md mx-auto bg-white p-6 rounded-[2rem] shadow-xl border">
                <div class="relative aspect-square bg-slate-900 rounded-3xl overflow-hidden mb-6">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div id="scan-result" class="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border">
                    <div id="res-img-container" class="w-16 h-16 rounded-xl bg-slate-200 overflow-hidden">
                        <img id="res-img" class="w-full h-full object-cover hidden">
                    </div>
                    <div>
                        <h3 id="res-name" class="text-lg font-bold">รอการสแกน...</h3>
                        <p id="res-id" class="text-blue-500 text-xs font-mono">ID: -</p>
                    </div>
                </div>
                <button id="btn-submit" onclick="finishAttendance()" class="w-full mt-6 bg-slate-200 text-slate-400 py-4 rounded-2xl font-bold cursor-not-allowed" disabled>บันทึกเข้า Sheets</button>
            </div>
        </div>

        <div id="content-manage" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">ฐานข้อมูลพนักงาน</h2>
                <button onclick="openAddModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition-all">+ เพิ่มพนักงาน</button>
            </div>
            <div class="bg-white rounded-2xl border overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-4">รูป</th><th class="p-4">รหัส</th><th class="p-4">ชื่อ</th><th class="p-4">แผนก</th><th class="p-4 text-center">จัดการ</th></tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="student-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full mx-4 shadow-2xl space-y-4">
            <h3 class="text-xl font-bold text-center">ลงทะเบียนพนักงาน</h3>
            <div class="relative w-32 h-32 mx-auto bg-slate-100 rounded-2xl overflow-hidden border-2 border-dashed border-slate-300">
                <video id="modal-video" class="w-full h-full object-cover hidden" autoplay muted playsinline></video>
                <img id="preview-img" class="w-full h-full object-cover hidden">
                <div id="video-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-400">
                    <i data-lucide="camera" class="w-8 h-8"></i>
                </div>
            </div>
            <div class="flex justify-center space-x-2">
                <button id="btn-open-cam" onclick="startModalCamera()" class="bg-slate-800 text-white px-4 py-1.5 rounded-lg text-xs font-bold">เปิดกล้อง</button>
                <button id="btn-snap" onclick="snapPhoto()" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold hidden">ถ่ายรูป</button>
            </div>
            <input type="text" id="modal-id" placeholder="รหัสพนักงาน" class="w-full border p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="modal-name" placeholder="ชื่อ-นามสกุล" class="w-full border p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="modal-class" placeholder="แผนก/ตำแหน่ง" class="w-full border p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <div class="pt-4 flex flex-col space-y-2">
                <button id="btn-save-student" onclick="saveStudent()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">บันทึกข้อมูล</button>
                <button onclick="closeStudentModal()" class="w-full text-slate-400 text-xs py-2">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0Od_-aT7INphDUKlx7OB6NhgRH9O2gb6obyB2pXU2VA9g3takchN20-XhyMt8KJ1N/exec";
        let students = [], attendance = [], faceMatcher = null, scannedData = null, capturedImg = null;
        let isDetectorRunning = false;

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
            await loadAllData();
            await initFaceAPI();
        };

        async function initFaceAPI() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            updateFaceMatcher();
        }

        async function updateFaceMatcher() {
            const labeledDescriptors = await Promise.all(students.filter(s => s.imagedatabase64).map(async s => {
                const img = await faceapi.fetchImage(s.imagedatabase64);
                const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                return detection ? new faceapi.LabeledFaceDescriptors(s.studentid, [detection.descriptor]) : null;
            }));
            const validDescriptors = labeledDescriptors.filter(d => d !== null);
            if(validDescriptors.length) faceMatcher = new faceapi.FaceMatcher(validDescriptors, 0.6);
        }

        async function loadAllData() {
            const [sRes, aRes] = await Promise.all([apiCall({action:'getStudents'}), apiCall({action:'getAttendance'})]);
            if(sRes.success) { students = sRes.data; renderStudentTable(); updateFaceMatcher(); }
            if(aRes.success) { attendance = aRes.data; renderDashboard(); }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'font-bold', 'shadow-sm');
                btn.classList.add('text-slate-600');
            });
            document.getElementById(`tab-${tab}`).classList.add('bg-blue-600', 'text-white', 'font-bold', 'shadow-sm');
            
            if (tab === 'scan') { startCamera('video'); startDetector(); } 
            else { stopCamera('video'); isDetectorRunning = false; }
        }

        async function startDetector() {
            if (isDetectorRunning) return;
            isDetectorRunning = true;
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            const loop = async () => {
                if (!isDetectorRunning) return;
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                if (faceMatcher && resizedDetections.length > 0) {
                    const result = faceMatcher.findBestMatch(resizedDetections[0].descriptor);
                    const student = students.find(s => s.studentid === result.label);
                    if (student && result.distance < 0.5) {
                        showScanResult(student);
                    }
                    faceapi.draw.drawDetections(canvas, resizedDetections);
                }
                requestAnimationFrame(loop);
            };
            loop();
        }

        function showScanResult(s) {
            scannedData = s;
            document.getElementById('res-name').innerText = s.name;
            document.getElementById('res-id').innerText = `ID: ${s.studentid}`;
            const img = document.getElementById('res-img');
            img.src = s.imagedatabase64;
            img.classList.remove('hidden');
            const btn = document.getElementById('btn-submit');
            btn.disabled = false;
            btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
            btn.classList.add('bg-blue-600', 'text-white');
        }

        async function finishAttendance() {
            if(!scannedData) return;
            const now = new Date();
            const record = {
                id: scannedData.studentid,
                name: scannedData.name,
                class: scannedData.class,
                timestamp: now.toLocaleString('th-TH'),
                location: 'Main Office',
                status: now.getHours() >= 9 ? 'มาสาย' : 'มาปกติ'
            };
            const btn = document.getElementById('btn-submit');
            btn.innerText = "กำลังบันทึก...";
            const res = await apiCall({action: 'recordAttendanceUpdate', data: [record]});
            if(res.success) {
                alert('บันทึกสำเร็จ!');
                loadAllData();
                btn.innerText = "บันทึกข้อมูลเข้า Sheets";
            }
        }

        async function startCamera(id) {
            const video = document.getElementById(id);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) { alert("กล้องขัดข้อง: " + err.message); }
        }

        function stopCamera(id) {
            const video = document.getElementById(id);
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        // --- Manage Functions ---
        function openAddModal() { document.getElementById('student-modal').classList.remove('hidden'); }
        function closeStudentModal() {
            stopCamera('modal-video');
            document.getElementById('student-modal').classList.add('hidden');
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('video-placeholder').classList.remove('hidden');
            document.getElementById('modal-video').classList.add('hidden');
            document.getElementById('btn-snap').classList.add('hidden');
            document.getElementById('btn-open-cam').classList.remove('hidden');
            ['modal-id', 'modal-name', 'modal-class'].forEach(i => document.getElementById(i).value = '');
            capturedImg = null;
        }

        async function startModalCamera() {
            await startCamera('modal-video');
            document.getElementById('modal-video').classList.remove('hidden');
            document.getElementById('video-placeholder').classList.add('hidden');
            document.getElementById('btn-snap').classList.remove('hidden');
            document.getElementById('btn-open-cam').classList.add('hidden');
        }

        function snapPhoto() {
            const video = document.getElementById('modal-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImg = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('preview-img').src = capturedImg;
            document.getElementById('preview-img').classList.remove('hidden');
            video.classList.add('hidden');
            stopCamera('modal-video');
        }

        async function saveStudent() {
            const data = {
                id: document.getElementById('modal-id').value,
                name: document.getElementById('modal-name').value,
                class: document.getElementById('modal-class').value,
                imageData: capturedImg
            };
            if(!data.id || !data.name || !capturedImg) return alert('กรุณากรอกข้อมูลและถ่ายรูป');
            const btn = document.getElementById('btn-save-student');
            btn.innerText = "กำลังบันทึก...";
            const res = await apiCall({action:'addStudent', data: data});
            if(res.success) { closeStudentModal(); loadAllData(); }
            btn.innerText = "บันทึกข้อมูล";
        }

        async function apiCall(p) {
            try {
                const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)});
                return await r.json();
            } catch(e) { console.error(e); return {success:false}; }
        }

        function renderDashboard() {
            const dateInput = document.getElementById('dashboard-date').value;
            const daily = attendance.filter(a => a.timestamp && a.timestamp.includes(dateInput.split('-').reverse().join('/')));
            const checkedIds = new Set(daily.map(a => String(a.id)));
            
            const normL = document.getElementById('normal-list');
            const lateL = document.getElementById('late-list-display');
            const absL = document.getElementById('absent-list');
            normL.innerHTML = ''; lateL.innerHTML = ''; absL.innerHTML = '';

            let cN = 0, cL = 0;
            daily.forEach(a => {
                const s = students.find(x => String(x.studentid) === String(a.id));
                const html = `<div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl mb-2 border">
                    <img src="${s?.imagedatabase64 || ''}" class="w-10 h-10 rounded-lg object-cover">
                    <div><p class="font-bold text-xs">${a.name}</p><p class="text-[10px] text-slate-400">${a.timestamp.split(' ')[1]}</p></div>
                </div>`;
                if(a.status === 'มาปกติ') { normL.innerHTML += html; cN++; } else { lateL.innerHTML += html; cL++; }
            });

            students.filter(s => !checkedIds.has(String(s.studentid))).forEach(s => {
                absL.innerHTML += `<div class="flex items-center gap-3 opacity-60 p-2 mb-2">
                    <img src="${s.imagedatabase64}" class="w-10 h-10 rounded-lg object-cover grayscale">
                    <p class="font-bold text-xs">${s.name}</p>
                </div>`;
            });

            document.getElementById('stat-present').innerText = cN;
            document.getElementById('stat-late').innerText = cL;
            document.getElementById('stat-absent').innerText = students.length - checkedIds.size;
        }

        function renderStudentTable() {
            document.getElementById('student-table-body').innerHTML = students.map(s => `
                <tr>
                    <td class="p-4"><img src="${s.imagedatabase64}" class="w-10 h-10 rounded-lg object-cover"></td>
                    <td class="p-4 font-mono text-xs">${s.studentid}</td>
                    <td class="p-4 font-bold">${s.name}</td>
                    <td class="p-4 text-slate-400">${s.class || '-'}</td>
                    <td class="p-4 text-center"><button class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>

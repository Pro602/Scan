<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THAISIAM INKJET - Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #121417; color: #f8fafc; }
        .dashboard-card { background: #1e2126; border: 1px solid #2d333b; border-radius: 1.5rem; }
        .list-window { height: 500px; overflow-y: auto; scrollbar-width: none; }
        .list-window::-webkit-scrollbar { display: none; }
        nav { background: #1a1c1e; border-bottom: 1px solid #2d333b; }
        .tab-active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .tab-inactive { color: #94a3b8; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://i.ibb.co/m0fH4qV/logo-thaisiam.png" alt="Logo" class="w-10 h-10 object-contain">
                <div class="flex flex-col">
                    <span class="text-blue-400 font-bold text-xl tracking-tight">THAISIAM INKJET</span>
                    <span class="text-slate-500 text-[10px] uppercase tracking-widest font-medium">Professional Attendance Recording Systems</span>
                </div>
            </div>
            <div class="flex bg-slate-800 p-1 rounded-2xl border border-slate-700">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-6 py-2 rounded-xl text-sm font-bold tab-active transition-all">Dashboard</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-6 py-2 rounded-xl text-sm font-medium tab-inactive transition-all">สแกนบันทึกเวลา</button>
                <button onclick="switchTab('manage')" id="tab-manage" class="px-6 py-2 rounded-xl text-sm font-medium tab-inactive transition-all">พนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div id="content-dashboard" class="space-y-6">
            <div class="flex justify-between items-center pb-4">
                <h2 class="text-xl font-bold text-slate-100">สรุปการเข้างานประจำวัน</h2>
                <div class="relative">
                    <input type="date" id="dashboard-date" onchange="renderDashboard()" class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 text-sm font-bold text-white outline-none">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 text-center font-bold">
                <div class="bg-white p-4 rounded-2xl border-b-4 border-emerald-400"><p class="text-[10px] text-slate-400 uppercase">มาปกติ</p><p id="stat-norm" class="text-3xl text-emerald-600">0</p></div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-amber-400"><p class="text-[10px] text-slate-400 uppercase">มาสาย</p><p id="stat-late" class="text-3xl text-amber-600">0</p></div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-blue-400"><p class="text-[10px] text-slate-400 uppercase">สแกนออก</p><p id="stat-out" class="text-3xl text-blue-600">0</p></div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-rose-400"><p class="text-[10px] text-slate-400 uppercase">ยังไม่สแกน</p><p id="stat-abs" class="text-3xl text-rose-600">0</p></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-emerald-50/5 rounded-3xl border border-emerald-500/20 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-emerald-500/10 font-bold text-emerald-400 text-xs flex items-center bg-emerald-500/5"><i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> มาปกติ (IN)</div>
                    <div id="normal-list" class="list-window p-3 space-y-2"></div>
                </div>
                <div class="bg-amber-50/5 rounded-3xl border border-amber-500/20 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-amber-500/10 font-bold text-amber-400 text-xs flex items-center bg-amber-500/5"><i data-lucide="clock" class="w-4 h-4 mr-2"></i> มาสาย (IN)</div>
                    <div id="late-list" class="list-window p-3 space-y-2"></div>
                </div>
                <div class="bg-blue-50/5 rounded-3xl border border-blue-500/20 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-blue-500/10 font-bold text-blue-400 text-xs flex items-center bg-blue-500/5"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i> สแกนออก (OUT)</div>
                    <div id="out-list" class="list-window p-3 space-y-2"></div>
                </div>
                <div class="bg-rose-50/5 rounded-3xl border border-rose-500/20 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-rose-500/10 font-bold text-rose-400 text-xs flex items-center bg-rose-500/5"><i data-lucide="user-minus" class="w-4 h-4 mr-2"></i> ยังไม่สแกน</div>
                    <div id="absent-list" class="list-window p-3 space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="hidden">
            <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl text-slate-800">
                <div class="mb-6">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">📍 สถานที่ปฏิบัติงาน</label>
                    <select id="location-select" class="w-full p-4 rounded-2xl border border-slate-200 bg-slate-50 text-sm font-bold focus:ring-2 ring-blue-500 outline-none">
                        <option value="">-- กำลังโหลดสถานที่ --</option>
                    </select>
                </div>
                <div class="relative aspect-[4/3] bg-slate-900 rounded-3xl overflow-hidden mb-6 border-4 border-white shadow-inner">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="flex items-center space-x-5 bg-slate-50 p-5 rounded-3xl border border-slate-100 mb-8">
                    <div class="relative">
                        <img id="res-img" class="w-20 h-20 rounded-2xl object-cover border-2 border-white shadow-md hidden">
                        <div id="res-img-placeholder" class="w-20 h-20 bg-slate-200 rounded-2xl flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-8 h-8"></i></div>
                    </div>
                    <div>
                        <h3 id="res-name" class="text-xl font-bold tracking-tight">พร้อมสแกน...</h3>
                        <p id="res-id" class="text-blue-500 text-xs font-mono font-bold tracking-widest uppercase">Standing By</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-in" onclick="finishAttendance('IN')" class="bg-emerald-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">บันทึกเข้างาน (IN)</button>
                    <button id="btn-out" onclick="finishAttendance('OUT')" class="bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition-all">บันทึกออกงาน (OUT)</button>
                </div>
            </div>
        </div>

    </main>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycby9t947sFIvKCyxoLrFjLu0nNSGo95rdgFLarIfIVanE7kCKEDfglqgikUZCeFC_JAj/exec";
    let students = [], attendance = [], locationList = [], faceMatcher = null, scanned = new Map();

    window.onload = async () => {
        lucide.createIcons();
        document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
        await loadAllData(); 
        await initFaceAPI(); 
    };

    async function apiCall(p) {
        try { const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)}); return await r.json(); } 
        catch(e) { return {success:false}; }
    }

    async function loadAllData() {
        const [sRes, aRes, lRes] = await Promise.all([
            apiCall({action:'getStudents'}), apiCall({action:'getAttendance'}), apiCall({action:'getLocations'})
        ]);
        if(sRes.success) students = sRes.data;
        if(aRes.success) attendance = aRes.data;
        if(lRes.success) { locationList = lRes.data; renderLocationDropdown(); }
        renderDashboard();
    }

    function renderLocationDropdown() {
        const select = document.getElementById('location-select');
        select.innerHTML = '<option value="">-- เลือกสถานที่ --</option>';
        locationList.forEach((loc, index) => {
            const option = document.createElement('option');
            option.value = index; option.text = loc.name;
            select.appendChild(option);
        });
    }

    async function initFaceAPI() {
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        const labeled = [];
        for (const s of students) {
            if (s.imagedatabase64) {
                try {
                    const img = await faceapi.fetchImage(s.imagedatabase64);
                    const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                    if (det) labeled.push(new faceapi.LabeledFaceDescriptors(String(s.studentid), [det.descriptor]));
                } catch(e) {}
            }
        }
        // ปรับ Threshold = 0.4 เพื่อความแม่นยำสูง (ลดการจับคนผิด)
        if (labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.4); 
    }

    async function startDetector() {
        const v = document.getElementById('video');
        setInterval(async () => {
            if(v.paused || v.ended || !faceMatcher) return;
            const dets = await faceapi.detectAllFaces(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
            if(dets.length > 0) {
                dets.forEach(d => {
                    const match = faceMatcher.findBestMatch(d.descriptor);
                    const s = students.find(x => String(x.studentid) === match.label);
                    if(s && match.distance < 0.4) { // ตรวจสอบระยะห่างที่เข้มงวด
                        scanned.set(s.studentid, s);
                        document.getElementById('res-name').innerText = s.name;
                        document.getElementById('res-id').innerText = `ID: ${s.studentid}`;
                        document.getElementById('res-img').src = s.imagedatabase64;
                        document.getElementById('res-img').classList.remove('hidden');
                        document.getElementById('res-img-placeholder').classList.add('hidden');
                    }
                });
            }
        }, 500);
    }

    function renderDashboard() {
        const dateStr = document.getElementById('dashboard-date').value;
        const daily = attendance.filter(a => a.timestamp && a.timestamp.includes(dateStr));
        const checkedIds = new Set(daily.map(a => String(a.id)));

        const lists = { norm: document.getElementById('normal-list'), late: document.getElementById('late-list'), out: document.getElementById('out-list'), abs: document.getElementById('absent-list') };
        const stats = { norm:0, late:0, out:0, abs:0 };

        Object.values(lists).forEach(l => l.innerHTML = '');

        const createItem = (a, s) => {
            const time = a.timestamp.split(' ')[1] || '';
            const locName = a.location_name || a.location || '';
            const mapUrl = a.location && a.location.includes(',') ? `https://www.google.com/maps?q=${a.location}` : '#';
            const color = a.type === 'OUT' ? 'blue' : (a.status === 'สาย' ? 'amber' : 'emerald');

            return `
            <div class="bg-white p-3 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100">
                <div class="flex items-center space-x-3">
                    <img src="${s?.imagedatabase64 || ''}" class="w-10 h-10 rounded-xl object-cover border">
                    <div>
                        <p class="font-bold text-slate-800 text-xs">${a.name}</p>
                        <p class="text-[10px] text-slate-400 font-medium">
                            ${time} น. 
                            <span class="block text-blue-500 font-bold">(${locName})</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="${mapUrl}" target="_blank" class="text-rose-500 hover:scale-110 transition-transform"><i data-lucide="map-pin" class="w-4 h-4"></i></a>
                    <span class="status-badge bg-${color}-100 text-${color}-600">${a.type==='OUT'?'ออก':a.status}</span>
                </div>
            </div>`;
        };

        daily.forEach(a => {
            const s = students.find(x => String(x.studentid) === String(a.id));
            if(a.type === 'OUT') { lists.out.innerHTML += createItem(a, s); stats.out++; }
            else if(a.status === 'สาย') { lists.late.innerHTML += createItem(a, s); stats.late++; }
            else { lists.norm.innerHTML += createItem(a, s); stats.norm++; }
        });

        students.forEach(s => {
            if(!checkedIds.has(String(s.studentid))) {
                stats.abs++;
                lists.abs.innerHTML += `
                <div class="bg-white/80 p-3 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100 opacity-80">
                    <div class="flex items-center space-x-3">
                        <img src="${s.imagedatabase64 || ''}" class="w-10 h-10 rounded-xl object-cover border grayscale">
                        <div>
                            <p class="font-bold text-slate-700 text-xs">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${s.class || 'N/A'}</p>
                        </div>
                    </div>
                    <span class="status-badge bg-slate-100 text-slate-400">WAITING</span>
                </div>`;
            }
        });

        document.getElementById('stat-norm').innerText = stats.norm;
        document.getElementById('stat-late').innerText = stats.late;
        document.getElementById('stat-out').innerText = stats.out;
        document.getElementById('stat-abs').innerText = stats.abs;
        lucide.createIcons();
    }

    async function finishAttendance(type) {
        if (scanned.size === 0) return alert("โปรดรอให้ระบบสแกนใบหน้าสำเร็จก่อน");
        const select = document.getElementById('location-select');
        if (select.value === "") return alert("โปรดเลือกสถานที่ปฏิบัติงาน");

        const selectedLoc = locationList[select.value];
        let gps = "";
        try {
            const p = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            gps = `${p.coords.latitude},${p.coords.longitude}`;
        } catch(e) { gps = "Location Off"; }

        const now = new Date();
        const ts = now.toISOString().slice(0,10) + " " + now.toTimeString().split(' ')[0];
        const isLate = type==='IN' && (now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() > 30));

        const data = Array.from(scanned.values()).map(s => ({
            id: s.studentid, name: s.name, class: s.class, timestamp: ts,
            location: gps, location_name: selectedLoc.name,
            status: isLate ? 'สาย' : (type==='OUT'?'ออกงาน':'มาปกติ'), type: type
        }));

        const res = await apiCall({action:'recordAttendanceUpdate', data: data});
        if(res.success) { alert(`บันทึก${type}สำเร็จ!`); location.reload(); }
    }

    function switchTab(tab) {
        document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(`content-${tab}`).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => {
            b.classList.remove('tab-active'); b.classList.add('tab-inactive');
        });
        document.getElementById(`tab-${tab}`).classList.add('tab-active');
        if(tab === 'scan') { startCamera(); startDetector(); }
    }

    async function startCamera() {
        const v = document.getElementById('video');
        v.srcObject = await navigator.mediaDevices.getUserMedia({video:true});
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนหน้าเข้าออกพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #1a1c1e; color: #f8fafc; }
        .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; overflow: hidden; border-radius: 0.75rem; }
        .logo-fade { animation: fadeInLogo 1.2s ease forwards; }
        .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; }
        @keyframes fadeInLogo { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        
        .scroll-container { display: flex; flex-direction: column; animation: scrollUp 20s linear infinite; }
        .scroll-container:hover { animation-play-state: paused; } 
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .list-window { overflow: hidden; position: relative; }
        nav { background-color: #25282c !important; border-bottom: 1px solid #334155; }
        .tab-inactive { color: #94a3b8 !important; }
        .btn-pending-pulse { animation: pulse-orange 2s infinite; border: 1px solid #f59e0b !important; }
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
<body>

    <nav class="shadow-lg sticky top-0 z-50 p-3">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-4">
                <div class="logo-wrapper">
                    <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-fade logo-spin w-14 h-14 object-contain rounded-xl border border-slate-700">
                </div>
                <div class="flex flex-col">
                    <span class="text-blue-400 font-bold text-2xl tracking-tight">THAISIAM INKJET</span>
                    <span class="text-slate-500 text-[10px] uppercase tracking-[0.2em]">Attendance System</span>
                </div>
            </div>
            <div class="flex bg-slate-800 p-1 rounded-2xl border border-slate-700 overflow-x-auto">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white transition-all whitespace-nowrap">Dashboard</button>
                <button onclick="switchTab('scan')" id="tab-scan" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">สแกนใบหน้า</button>
                <button onclick="switchTab('leave')" id="tab-leave" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">แจ้งลา</button>
                <button onclick="switchTab('approve')" id="tab-approve" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">อนุมัติ</button>
                <button onclick="switchTab('manage')" id="tab-manage" class="px-4 py-2 rounded-xl text-sm font-medium tab-inactive transition-all whitespace-nowrap">ตั้งค่าพนักงาน</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div id="content-dashboard" class="space-y-6">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                <h2 class="text-lg font-bold text-slate-200">สรุปการเข้างานวันนี้</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-600 text-sm text-white outline-none">
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl border-b-4 border-emerald-500 text-center shadow-lg">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">มาปกติ</span>
                    <p id="stat-present" class="text-3xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-amber-500 text-center shadow-lg">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">มาสาย</span>
                    <p id="stat-late" class="text-3xl font-black text-amber-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-blue-500 text-center shadow-lg">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">ออกงานแล้ว</span>
                    <p id="stat-out" class="text-3xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-b-4 border-rose-500 text-center shadow-lg">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">ขาด/ยังไม่สแกน</span>
                    <p id="stat-absent" class="text-3xl font-black text-rose-600">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-emerald-900/30 border-b border-emerald-500/30 text-emerald-400 font-bold text-xs uppercase">มาปกติ</div>
                    <div class="list-window flex-grow"><div id="normal-list" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-amber-900/30 border-b border-amber-500/30 text-amber-400 font-bold text-xs uppercase">มาสาย</div>
                    <div class="list-window flex-grow"><div id="late-list-display" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-blue-900/30 border-b border-blue-500/30 text-blue-400 font-bold text-xs uppercase">ออกงาน</div>
                    <div class="list-window flex-grow"><div id="out-list" class="p-2 space-y-2"></div></div>
                </div>
                <div class="bg-slate-800/50 rounded-2xl overflow-hidden h-[500px] flex flex-col border border-slate-700">
                    <div class="p-3 bg-rose-900/30 border-b border-rose-500/30 text-rose-400 font-bold text-xs uppercase">ยังไม่สแกน/ลา</div>
                    <div class="list-window flex-grow"><div id="absent-list" class="p-2 space-y-2"></div></div>
                </div>
            </div>
        </div>

        <div id="content-scan" class="hidden">
            <div class="max-w-md mx-auto bg-white p-6 rounded-[2.5rem] shadow-2xl text-slate-800">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">📍 เลือกสถานที่</label>
                    <select id="location-select" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-bold">
                        <option value="">-- กำลังโหลดสถานที่ --</option>
                    </select>
                </div>
                <div class="relative aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-4 shadow-inner">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border mb-6">
                    <img id="res-img" class="w-16 h-16 rounded-xl object-cover border-2 border-white shadow hidden">
                    <div id="res-img-placeholder" class="w-16 h-16 bg-slate-200 rounded-xl flex items-center justify-center text-slate-400"><i data-lucide="user"></i></div>
                    <div>
                        <h3 id="res-name" class="text-lg font-bold">พร้อมสแกน...</h3>
                        <p id="res-id" class="text-blue-500 text-xs font-mono">STANDING BY</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-in" onclick="finishAttendance('IN')" class="bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700">บันทึกเข้า (IN)</button>
                    <button id="btn-out" onclick="finishAttendance('OUT')" class="bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700">บันทึกออก (OUT)</button>
                </div>
            </div>
        </div>

        </main>

    <div id="login-modal" class="fixed inset-0 bg-slate-900/90 z-[300] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2rem] max-w-xs w-full shadow-2xl space-y-4 text-slate-800">
            <h3 class="text-lg font-bold text-center">เข้าสู่ระบบจัดการ</h3>
            <input type="text" id="login-user" placeholder="Username" class="w-full border p-3 rounded-xl outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full border p-3 rounded-xl outline-none">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Login</button>
            <button onclick="closeLoginModal()" class="w-full text-slate-400 text-xs">ยกเลิก</button>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>
    <audio id="snd-ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycby9t947sFIvKCyxoLrFjLu0nNSGo95rdgFLarIfIVanE7kCKEDfglqgikUZCeFC_JAj/exec";
    let students = [], attendance = [], locationList = [], leaves = [], faceMatcher = null;
    let isLoggedIn = false, pendingAction = null;
    const AUTHORIZED_USERS = { "Weera": "TS001", "Jang": "TS002" };

    window.onload = async () => {
        lucide.createIcons();
        document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
        await loadAllData(); 
        await initFaceAPI(); 
        // Auto-refresh ทุก 30 วินาที
        setInterval(async () => {
            const [aRes, vRes] = await Promise.all([apiCall({action:'getAttendance'}), apiCall({action:'getLeaves'})]);
            if(aRes.success) attendance = aRes.data;
            if(vRes.success) leaves = vRes.data;
            renderDashboard();
        }, 30000);
    };

    async function apiCall(p) {
        try { const r = await fetch(gasUrl, {method:'POST', body:JSON.stringify(p)}); return await r.json(); } 
        catch(e) { return {success:false}; }
    }

    async function loadAllData() {
        const [sRes, aRes, lRes, vRes] = await Promise.all([
            apiCall({action:'getStudents'}), apiCall({action:'getAttendance'}), 
            apiCall({action:'getLocations'}), apiCall({action:'getLeaves'})
        ]);
        if(sRes.success) students = sRes.data;
        if(aRes.success) attendance = aRes.data;
        if(lRes.success) { locationList = lRes.data; renderLocationDropdown(); }
        if(vRes.success) leaves = vRes.data;
        renderDashboard();
    }

    // --- Face Recognition Logic ---
    async function initFaceAPI() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            await updateFaceMatcher();
        } catch (e) { console.error("Face API Error", e); }
    }

    async function updateFaceMatcher() {
        const labeled = await Promise.all(students.map(async s => {
            if (!s.imagedatabase64) return null;
            const img = await faceapi.fetchImage(s.imagedatabase64);
            const desc = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            return desc ? new faceapi.LabeledFaceDescriptors(String(s.studentid), [desc.descriptor]) : null;
        }));
        const valid = labeled.filter(d => d !== null);
        if (valid.length > 0) faceMatcher = new faceapi.FaceMatcher(valid, 0.6);
    }

    async function startDetector() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(canvas, displaySize);

        const loop = async () => {
            if (video.paused || video.ended || !faceMatcher) return setTimeout(loop, 500);
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
            const resizedResults = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            
            resizedResults.forEach(result => {
                const match = faceMatcher.findBestMatch(result.descriptor);
                const s = students.find(x => String(x.studentid) === String(match.label));
                if (s && match.distance < 0.5) {
                    document.getElementById('res-name').innerText = s.name;
                    document.getElementById('res-id').innerText = s.studentid;
                    document.getElementById('res-img').src = s.imagedatabase64;
                    document.getElementById('res-img').classList.remove('hidden');
                    document.getElementById('res-img-placeholder').classList.add('hidden');
                    new faceapi.draw.DrawBox(result.detection.box, { label: s.name }).draw(canvas);
                }
            });
            setTimeout(loop, 200);
        };
        loop();
    }

    // --- GPS & บันทึกเวลา ---
    async function finishAttendance(type) {
        const id = document.getElementById('res-id').innerText;
        const loc = document.getElementById('location-select').value;
        if (id === 'STANDING BY') return alert("กรุณาสแกนใบหน้าก่อน");
        if (!loc) return alert("กรุณาเลือกสถานที่");

        const btn = type === 'IN' ? document.getElementById('btn-in') : document.getElementById('btn-out');
        btn.disabled = true; btn.innerText = "กำลังบันทึก...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const res = await apiCall({
                action: 'addAttendance',
                data: { id: id, type: type, location_name: loc, lat: pos.coords.latitude, lng: pos.coords.longitude }
            });
            if (res.success) {
                document.getElementById('snd-ok').play(); // เสียงติ๊ดแจ้งเตือน
                alert("บันทึกสำเร็จ");
                location.reload();
            } else {
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
                btn.innerText = type === 'IN' ? 'บันทึกเข้า (IN)' : 'บันทึกออก (OUT)';
            }
        }, () => {
            alert("กรุณาเปิด GPS");
            btn.disabled = false;
        }, { enableHighAccuracy: true });
    }

    // --- Dashboard & Google Maps Link ---
    function renderDashboard() {
        const dateInput = document.getElementById('dashboard-date').value;
        const daily = attendance.filter(a => a.timestamp && String(a.timestamp).includes(dateInput));
        const checkedInIds = new Set(daily.filter(a => a.type === 'IN').map(a => String(a.id)));
        const lists = { norm: document.getElementById('normal-list'), late: document.getElementById('late-list-display'), out: document.getElementById('out-list'), abs: document.getElementById('absent-list') };
        
        Object.values(lists).forEach(l => { if(l) { l.innerHTML = ''; l.classList.remove('scroll-container'); }});

        let cIn = 0, cLate = 0, cOut = 0;

        daily.forEach(a => {
            const s = students.find(x => String(x.studentid) === String(a.id));
            const time = a.timestamp.split(' ')[1] || '';
            const mapLink = (a.lat && a.lng) ? `https://www.google.com/maps?q=${a.lat},${a.lng}` : '#';
            
            const html = `
                <div class="bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-3">
                        <img src="${s?.imagedatabase64 || ''}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="flex-grow">
                            <p class="text-[10px] font-bold text-slate-700 leading-none">${a.name}</p>
                            <p class="text-[9px] text-blue-600 font-mono font-bold mt-1">${time} น. | ${a.location_name || '-'}</p>
                            ${a.lat ? `<a href="${mapLink}" target="_blank" class="text-[8px] text-emerald-600 flex items-center mt-0.5 hover:underline"><i data-lucide="map-pin" class="w-2.5 h-2.5 mr-0.5"></i> ดูพิกัดแผนที่</a>` : ''}
                        </div>
                    </div>
                </div>`;

            if (a.type === 'OUT') { lists.out.innerHTML += html; cOut++; }
            else if (a.status === 'สาย') { lists.late.innerHTML += html; cLate++; }
            else { lists.norm.innerHTML += html; cIn++; }
        });

        // รายชื่อขาด/ลา
        students.forEach(s => {
            if(!checkedInIds.has(String(s.studentid))) {
                lists.abs.innerHTML += `
                    <div class="bg-white p-2 rounded-xl border border-slate-200 shadow-sm opacity-60">
                        <div class="flex items-center gap-3">
                            <img src="${s.imagedatabase64}" class="w-10 h-10 rounded-lg object-cover grayscale">
                            <p class="text-[10px] font-bold text-slate-400">${s.name}</p>
                        </div>
                    </div>`;
            }
        });

        document.getElementById('stat-present').innerText = cIn;
        document.getElementById('stat-late').innerText = cLate;
        document.getElementById('stat-out').innerText = cOut;
        document.getElementById('stat-absent').innerText = students.length - checkedInIds.size;

        // Auto Scroll ถ้าแถวยาว
        Object.keys(lists).forEach(k => {
            if(lists[k] && lists[k].children.length > 8) {
                lists[k].innerHTML += lists[k].innerHTML;
                lists[k].classList.add('scroll-container');
            }
        });
        lucide.createIcons();
    }

    function switchTab(tab) {
        if ((tab === 'approve' || tab === 'manage') && !isLoggedIn) {
            pendingAction = tab;
            document.getElementById('login-modal').classList.remove('hidden');
            return;
        }
        document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(`content-${tab}`).classList.remove('hidden');
        
        document.querySelectorAll('nav button').forEach(b => {
            b.classList.replace('bg-blue-600', 'tab-inactive');
            b.classList.remove('text-white', 'font-bold');
        });
        const active = document.getElementById(`tab-${tab}`);
        active.classList.replace('tab-inactive', 'bg-blue-600');
        active.classList.add('text-white', 'font-bold');

        if (tab === 'scan') { 
            startCamera('video').then(() => setTimeout(startDetector, 1000)); 
        } else {
            stopCamera('video');
        }
    }

    async function startCamera(id) {
        const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
        document.getElementById(id).srcObject = s;
    }

    function stopCamera(id) {
        const v = document.getElementById(id);
        if(v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
    }

    function renderLocationDropdown() {
        const sel = document.getElementById('location-select');
        sel.innerHTML = '<option value="">-- เลือกสถานที่ --</option>' + locationList.map(l => `<option value="${l.name}">${l.name}</option>`).join('');
    }

    function checkLogin() {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(AUTHORIZED_USERS[u] === p) {
            isLoggedIn = true;
            document.getElementById('login-modal').classList.add('hidden');
            switchTab(pendingAction);
        } else alert("รหัสผ่านไม่ถูกต้อง");
    }

    function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
</script>
</body>
</html>

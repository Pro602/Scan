<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนหน้าเข้าออกพนักงาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
    
    /* สไตล์โลโก้และแอนิเมชันตามแบบเดิม */
    .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; }
    .logo-fade { animation: fadeIn 1.5s ease-out forwards; }
    .logo-spin { animation: spin 10s linear infinite; transform-style: preserve-3d; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    .glass-card { 
        background: rgba(30, 41, 59, 0.7); 
        backdrop-filter: blur(16px); 
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .video-container { 
        position: relative; 
        width: 100%; 
        max-width: 400px; 
        aspect-ratio: 1/1; 
        border-radius: 2rem; 
        overflow: hidden; 
        background: #000;
        border: 4px solid #1e293b;
    }
    #video { width: 100%; height: 100%; object-fit: cover; transform: rotateY(180deg); }
    #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: rotateY(180deg); }
    
    .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: #10b981;
        box-shadow: 0 0 15px #10b981;
        animation: scanMove 2.5s infinite;
        z-index: 20;
    }
    @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

    .status-badge {
        padding: 4px 12px;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-action {
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 1.5rem;
        border-radius: 1.5rem;
    }
    .btn-action:active { transform: scale(0.95); }

    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- ส่วนหัวและโลโก้แบบเดิม -->
    <div class="w-full max-w-lg flex flex-col items-center mb-8 logo-fade">
        <div class="logo-wrapper mb-4">
            <img src="https://img5.pic.in.th/file/secure-sv1/thaisiam-removebg-preview.png" alt="Logo" class="h-20 logo-spin">
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">
            THAISIAM INKJET ATTENDANCE
        </h1>
        <p class="text-slate-400 text-sm mt-1">ระบบจดจำใบหน้าและบันทึกเวลา</p>
    </div>

    <!-- แผงควบคุมหลัก -->
    <div class="w-full max-w-md glass-card p-6 rounded-[2.5rem] relative overflow-hidden">
        
        <div class="flex justify-between items-center mb-6">
            <div id="status-badge" class="status-badge bg-slate-800 text-slate-400 border border-slate-700">
                🔴 ระบบปิดอยู่
            </div>
            <div id="clock" class="font-mono text-lg font-bold text-emerald-400">00:00:00</div>
        </div>

        <!-- พื้นที่แสดงวิดีโอ -->
        <div class="flex justify-center mb-8">
            <div class="video-container shadow-2xl">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas"></canvas>
                <div id="scan-line" class="scan-line hidden"></div>
                
                <!-- หน้าจอทับตอนเริ่ม -->
                <div id="start-overlay" class="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center p-6 text-center z-30">
                    <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-4">
                        <i data-lucide="camera" class="text-emerald-500 w-8 h-8"></i>
                    </div>
                    <p class="text-sm text-slate-300 mb-6">กรุณาเปิดกล้องเพื่อเริ่มต้นการใช้งานระบบสแกนใบหน้า</p>
                    <button onclick="startSystem()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-500/20 transition-all">
                        เปิดระบบสแกน
                    </button>
                </div>
            </div>
        </div>

        <!-- ข้อมูลพนักงานที่พบ -->
        <div id="staff-info" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-slate-800/50 border border-emerald-500/30 rounded-3xl p-5 mb-6 flex items-center gap-4">
                <div class="relative">
                    <img id="staff-img" src="" class="w-20 h-20 rounded-2xl object-cover border-2 border-emerald-500/50 bg-slate-700">
                    <div class="absolute -bottom-2 -right-2 bg-emerald-500 rounded-full p-1">
                        <i data-lucide="check" class="w-4 h-4 text-white"></i>
                    </div>
                </div>
                <div class="flex-1">
                    <h2 id="staff-name" class="text-xl font-bold text-white">พนักงานทดสอบ</h2>
                    <p id="staff-id" class="text-emerald-400 font-mono text-sm">ID: 000000</p>
                </div>
                <button onclick="clearMatch()" class="p-2 text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="rotate-ccw"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="recordAttendance('IN')" class="btn-action bg-emerald-600 hover:bg-emerald-500 text-white">
                    <i data-lucide="log-in" class="w-8 h-8"></i>
                    <span class="font-bold">เข้างาน (IN)</span>
                </button>
                <button onclick="recordAttendance('OUT')" class="btn-action bg-rose-600 hover:bg-rose-500 text-white">
                    <i data-lucide="log-out" class="w-8 h-8"></i>
                    <span class="font-bold">ออกงาน (OUT)</span>
                </button>
            </div>
        </div>

        <!-- ปุ่มควบคุมด้านล่าง (กรณีไม่เจอหน้าหรือต้องการลงทะเบียน) -->
        <div id="bottom-controls" class="grid grid-cols-2 gap-4 mt-2">
            <button onclick="openRegModal()" class="flex items-center justify-center gap-2 p-4 bg-slate-800 rounded-2xl border border-white/5 hover:bg-slate-700 transition-colors">
                <i data-lucide="user-plus" class="text-blue-400 w-5 h-5"></i>
                <span class="text-sm">ลงทะเบียนใหม่</span>
            </button>
            <button onclick="fetchStaffData()" class="flex items-center justify-center gap-2 p-4 bg-slate-800 rounded-2xl border border-white/5 hover:bg-slate-700 transition-colors">
                <i data-lucide="refresh-cw" id="sync-icon" class="text-purple-400 w-5 h-5"></i>
                <span class="text-sm">รีเฟรชข้อมูล</span>
            </button>
        </div>
    </div>

    <!-- Modal ลงทะเบียนพนักงานใหม่ -->
    <div id="regModal" class="modal">
        <div class="bg-white p-8 w-[95%] max-w-[400px] rounded-[2rem] shadow-2xl text-slate-900">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">ลงทะเบียนพนักงาน</h3>
                <button onclick="closeModal('regModal')" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">รหัสพนักงาน (Student ID)</label>
                    <input type="text" id="reg-id" placeholder="ป้อนรหัส 6 หลัก" class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-emerald-500 rounded-2xl outline-none transition-all font-bold text-lg">
                </div>
                
                <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <p class="text-xs text-emerald-700 leading-relaxed">
                        <i data-lucide="info" class="inline-block w-3 h-3 mr-1"></i>
                        การลงทะเบียนจะบันทึกโครงสร้างใบหน้าปัจจุบันเข้าสู่ระบบ โปรดมองตรงไปที่กล้องขณะกดปุ่ม
                    </p>
                </div>

                <button id="btn-save-face" onclick="saveFaceDescriptor()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-emerald-600 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="scan-face"></i> บันทึกข้อมูลใบหน้า
                </button>
            </div>
        </div>
    </div>

    <script>
        // กำหนด URL ของ Google Apps Script
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzeHotjOIF6_P5N82ByzrVIPamzMu_JnL27mc551WBdAfzKwCxD3akItWtcSd7cPO5a/exec';
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';

        let staffList = [];
        let faceMatcher = null;
        let isProcessing = false;
        let scanInterval = null;

        // 1. เริ่มต้นระบบ
        async function startSystem() {
            const overlay = document.getElementById('start-overlay');
            const status = document.getElementById('status-badge');
            
            overlay.innerHTML = `<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-500 mb-4"></div><p class="text-emerald-400 font-bold">กำลังโหลด AI และข้อมูล...</p>`;

            try {
                // โหลดโมเดล AI
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                // ดึงข้อมูลพนักงาน
                await fetchStaffData(false);

                // เปิดกล้อง
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                document.getElementById('video').srcObject = stream;

                overlay.classList.add('hidden');
                document.getElementById('scan-line').classList.remove('hidden');
                status.innerHTML = "🟢 กำลังสแกนหาใบหน้า...";
                status.className = "status-badge bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                
                startFaceDetection();
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเริ่มระบบ: " + err.message);
                location.reload();
            }
        }

        // 2. ดึงข้อมูลพนักงานจาก Google Sheets
        async function fetchStaffData(showAlert = true) {
            const syncIcon = document.getElementById('sync-icon');
            if(syncIcon) syncIcon.classList.add('animate-spin');

            try {
                const res = await fetch(`${GAS_URL}?action=getStudents`);
                const result = await res.json();
                if (result.success) {
                    staffList = result.data;
                    console.log("พนักงานทั้งหมด:", staffList.length);
                    
                    // สร้าง FaceMatcher จาก Descriptor ที่มีอยู่
                    const labeledDescriptors = staffList
                        .filter(s => s.descriptor && s.descriptor.length > 50)
                        .map(s => {
                            const desc = new Float32Array(JSON.parse(s.descriptor));
                            return new faceapi.LabeledFaceDescriptors(String(s.studentid), [desc]);
                        });

                    if (labeledDescriptors.length > 0) {
                        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);
                    }
                    
                    if(showAlert) alert(`อัปเดตข้อมูลพนักงาน ${staffList.length} ราย เรียบร้อยแล้ว`);
                }
            } catch (e) {
                console.error(e);
                if(showAlert) alert("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการเชื่อมต่อ");
            } finally {
                if(syncIcon) syncIcon.classList.remove('animate-spin');
            }
        }

        // 3. เริ่มการตรวจจับใบหน้า
        function startFaceDetection() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            scanInterval = setInterval(async () => {
                if (isProcessing) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if (detections.length > 0 && faceMatcher) {
                    resizedDetections.forEach(detection => {
                        const result = faceMatcher.findBestMatch(detection.descriptor);
                        if (result.label !== 'unknown') {
                            const matchedStaff = staffList.find(s => String(s.studentid) === result.label);
                            if (matchedStaff) {
                                showStaffProfile(matchedStaff);
                            }
                        }
                    });
                }
            }, 600);
        }

        // 4. แสดงข้อมูลพนักงานที่สแกนพบ
        function showStaffProfile(staff) {
            isProcessing = true; // หยุดสแกนชั่วคราวเพื่อแสดงผล
            document.getElementById('staff-name').innerText = staff.name;
            document.getElementById('staff-id').innerText = "ID: " + staff.studentid;
            document.getElementById('staff-img').src = staff.imagedatabase64 || 'https://via.placeholder.com/150';
            
            document.getElementById('staff-info').classList.remove('hidden');
            document.getElementById('bottom-controls').classList.add('hidden');
            document.getElementById('scan-line').classList.add('hidden');
            document.getElementById('status-badge').innerText = "✅ พบข้อมูลพนักงาน";
        }

        function clearMatch() {
            isProcessing = false;
            document.getElementById('staff-info').classList.add('hidden');
            document.getElementById('bottom-controls').classList.remove('hidden');
            document.getElementById('scan-line').classList.remove('hidden');
            document.getElementById('status-badge').innerText = "🟢 กำลังสแกนหาใบหน้า...";
        }

        // 5. บันทึกเวลา เข้า/ออก
        async function recordAttendance(type) {
            const staff = staffList.find(s => s.studentid === document.getElementById('staff-id').innerText.replace('ID: ', ''));
            if(!staff) return;

            document.getElementById('status-badge').innerText = "⏳ กำลังบันทึกเวลา...";
            
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'recordAttendanceUpdate',
                        data: [{
                            id: staff.studentid,
                            name: staff.name,
                            class: staff.class || 'สำนักงาน',
                            type: type
                        }]
                    })
                });
                alert(`บันทึกการ ${type === 'IN' ? 'เข้างาน' : 'ออกงาน'} สำเร็จ!`);
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                clearMatch();
            }
        }

        // 6. การลงทะเบียนใบหน้าใหม่
        function openRegModal() { document.getElementById('regModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function saveFaceDescriptor() {
            const idInput = document.getElementById('reg-id').value.trim();
            const video = document.getElementById('video');
            const btn = document.getElementById('btn-save-face');

            if (!idInput) return alert("โปรดป้อนรหัสพนักงาน");

            btn.disabled = true;
            btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div> กำลังแสกนใบหน้า...`;

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptor();

            if (detection) {
                const descriptor = JSON.stringify(Array.from(detection.descriptor));
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'saveDescriptor', studentid: idInput, descriptor: descriptor })
                    });
                    const result = await res.json();
                    if(result.success) {
                        alert("ลงทะเบียนใบหน้าสำเร็จ ระบบจะรีโหลดเพื่ออัปเดตข้อมูล");
                        location.reload();
                    } else {
                        alert("ไม่พบรหัสพนักงานนี้ในระบบ Google Sheets (โปรดตรวจสอบช่อง Student ID)");
                    }
                } catch (e) {
                    alert("บันทึกล้มเหลว: โปรดลองอีกครั้ง");
                }
            } else {
                alert("ไม่พบใบหน้าในกล้อง กรุณามองตรงไปที่เลนส์");
            }

            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="scan-face"></i> บันทึกข้อมูลใบหน้า`;
            lucide.createIcons();
        }

        // นาฬิกาและไอคอน
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
        }, 1000);
        lucide.createIcons();
    </script>
</body>
</html>

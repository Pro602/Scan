<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อพนักงานอัจฉริยะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 transition-colors duration-200">
    <nav class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="scan-face" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">ระบบเช็คชื่อพนักงาน</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button onclick="switchTab('dashboard')" id="btn-dashboard" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">Dashboard</button>
                    <button onclick="switchTab('scan')" id="btn-scan" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">เช็คชื่อ</button>
                    <button onclick="switchTab('manage')" id="btn-manage" class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">จัดการข้อมูล</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="tab-dashboard" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-700">ภาพรวมการมาทำงาน</h2>
                <input type="date" id="dashboard-date" onchange="renderDashboard()" class="border rounded-md px-3 py-1 text-sm shadow-sm">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 text-center">
                    <p class="text-blue-600 text-sm font-medium">มาทำงาน</p>
                    <p id="stat-present" class="text-3xl font-bold text-blue-700">0</p>
                </div>
                <div class="bg-yellow-50 p-6 rounded-xl border border-yellow-100 text-center">
                    <p class="text-yellow-600 text-sm font-medium">มาสาย</p>
                    <p id="stat-late" class="text-3xl font-bold text-yellow-700">0</p>
                </div>
                <div class="bg-red-50 p-6 rounded-xl border border-red-100 text-center">
                    <p class="text-red-600 text-sm font-medium">ขาดงาน</p>
                    <p id="stat-absent" class="text-3xl font-bold text-red-700">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border h-[350px] flex flex-col items-center">
                    <h3 class="text-gray-700 font-semibold mb-4">สรุปสัดส่วน</h3>
                    <canvas id="attendance-pie-chart" class="max-h-[250px]"></canvas>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border h-[350px] flex flex-col">
                    <h3 class="text-gray-700 font-semibold mb-4 border-b pb-2">รายละเอียดพนักงานประจำวัน</h3>
                    <div class="grid grid-cols-2 gap-4 flex-grow overflow-hidden">
                        <div class="flex flex-col">
                            <h4 class="text-orange-600 text-sm font-bold mb-2">มาสาย</h4>
                            <ul id="late-list" class="space-y-2 overflow-y-auto custom-scrollbar"></ul>
                        </div>
                        <div class="flex flex-col border-l pl-4">
                            <h4 class="text-red-600 text-sm font-bold mb-2">ขาดงาน</h4>
                            <ul id="absent-list" class="space-y-2 overflow-y-auto custom-scrollbar"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-scan" class="tab-content hidden">
            <div class="max-w-2xl mx-auto space-y-4">
                <div class="relative aspect-video bg-black rounded-2xl overflow-hidden shadow-xl border-4 border-white">
                    <video id="video" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div id="scan-result" class="bg-white p-6 rounded-2xl shadow-md flex items-center space-x-6 border-l-8 border-gray-200">
                    <img id="result-img" class="w-20 h-20 rounded-full object-cover border-2 border-gray-100 hidden">
                    <div id="result-placeholder" class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center">
                        <i data-lucide="user" class="w-10 h-10 text-gray-300"></i>
                    </div>
                    <div class="flex-grow">
                        <p id="result-name" class="text-xl font-bold text-gray-800">กรุณายืนหน้ากล้อง</p>
                        <p id="result-id" class="text-sm text-gray-500">ID: ----</p>
                    </div>
                    <button onclick="finishAttendance()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg">สรุปข้อมูล</button>
                </div>
            </div>
        </div>

        <div id="tab-manage" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-semibold">จัดการข้อมูลพนักงาน</h2>
                <button onclick="openStudentModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm flex items-center">
                    <i data-lucide="user-plus" class="w-4 h-4 mr-2"></i> เพิ่มพนักงาน
                </button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-xs uppercase font-bold text-gray-500">
                        <tr>
                            <th class="px-6 py-3">รูปภาพ</th>
                            <th class="px-6 py-3">รหัส</th>
                            <th class="px-6 py-3">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-3 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="student-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-4">เพิ่มพนักงาน</h3>
            <div class="space-y-4">
                <div class="flex flex-col items-center">
                    <div class="relative w-32 h-32 bg-gray-100 rounded-full overflow-hidden border-4 border-blue-50 shadow-inner">
                        <video id="modal-video" class="w-full h-full object-cover hidden" autoplay muted playsinline></video>
                        <img id="preview-img" class="w-full h-full object-cover">
                    </div>
                    <div class="flex space-x-2 mt-3">
                        <button id="btn-start-camera" onclick="startCaptureCamera()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">เปิดกล้อง</button>
                        <button id="btn-snap" onclick="snapPhoto()" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hidden">ถ่ายรูป</button>
                    </div>
                </div>
                <input type="text" id="modal-studentid" placeholder="รหัสพนักงาน" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="modal-name" placeholder="ชื่อ-นามสกุล" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="modal-class" placeholder="แผนก/ห้อง" class="w-full border p-3 rounded-xl outline-none">
                <button id="btn-save-student" onclick="saveStudent()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">บันทึกข้อมูล</button>
                <button onclick="closeStudentModal()" class="w-full text-gray-400 text-sm">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 hidden">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
            <h3 class="text-2xl font-bold mb-4">ตั้งค่าระบบ</h3>
            <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/AKfycbyv41uPkUeYIcYwNOBda1QSjdJp4_CbyXf-9-7WoK4ZTXXkpckOXNlxx1olJCJ5oOHF/exec" class="w-full border-2 p-3 rounded-xl mb-4 text-sm">
            <button onclick="saveGasUrl()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">บันทึกและเริ่มใช้งาน</button>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
        const GAS_URL_KEY = 'gasWebAppUrl';
        let gasWebAppUrl = localStorage.getItem(GAS_URL_KEY);
        let students = [], attendance = [], faceMatcher = null, isVideoRunning = false;
        let currentEditingStudent = null, capturedImageData = null, checkedInToday = new Map();

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('dashboard-date').value = new Date().toISOString().split('T')[0];
            if (!gasWebAppUrl) document.getElementById('setup-modal').classList.remove('hidden');
            else loadAllData();
        };

        async function loadAllData() {
            const resS = await apiCall({ action: 'getStudents' });
            if (resS.success) {
                students = resS.data;
                renderStudentTable();
                await initializeFaceAPI();
            }
            const resA = await apiCall({ action: 'getAttendance' });
            if (resA.success) { attendance = resA.data; renderDashboard(); }
            switchTab('dashboard');
        }

        async function initializeFaceAPI() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            const labeledDescriptors = await Promise.all(
                students.filter(s => s.imagedatabase64).map(async s => {
                    try {
                        const img = await faceapi.fetchImage(s.imagedatabase64);
                        const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                        return detection ? new faceapi.LabeledFaceDescriptors(s.studentid, [detection.descriptor]) : null;
                    } catch (e) { return null; }
                })
            );
            const valid = labeledDescriptors.filter(d => d !== null);
            if (valid.length > 0) faceMatcher = new faceapi.FaceMatcher(valid, 0.6);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            isVideoRunning = (tabId === 'scan');
            if (tabId === 'scan') startCamera();
            else stopCamera('video');
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                detectFaceLoop();
            } catch (e) { alert("กล้องขัดข้อง: " + e.message); }
        }

        async function detectFaceLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            const interval = setInterval(async () => {
                if (!isVideoRunning) { clearInterval(interval); return; }
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                if (faceMatcher && detections.length > 0) {
                    detections.forEach(d => {
                        const result = faceMatcher.findBestMatch(d.descriptor);
                        const student = students.find(s => s.studentid === result.label);
                        if (student && result.distance < 0.5) markCheckIn(student);
                    });
                }
                faceapi.draw.drawDetections(overlay, resized);
            }, 500);
        }

        function markCheckIn(student) {
            if (checkedInToday.has(student.studentid)) return;
            checkedInToday.set(student.studentid, true);
            document.getElementById('result-placeholder').classList.add('hidden');
            document.getElementById('result-img').classList.remove('hidden');
            document.getElementById('result-img').src = student.imagedatabase64;
            document.getElementById('result-name').innerText = student.name;
            document.getElementById('result-name').classList.add('text-green-600');
            document.getElementById('result-id').innerText = `ID: ${student.studentid}`;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(`${student.name} เช็คชื่อแล้ว`));
        }

        async function startCaptureCamera() {
            const video = document.getElementById('modal-video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.classList.remove('hidden');
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('btn-start-camera').classList.add('hidden');
            document.getElementById('btn-snap').classList.remove('hidden');
        }

        function snapPhoto() {
            const video = document.getElementById('modal-video');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            capturedImageData = canvas.toDataURL('image/jpeg', 0.7); // ย่อขนาดเพื่อประหยัดพื้นที่
            stopCamera('modal-video');
            document.getElementById('preview-img').src = capturedImageData;
            document.getElementById('preview-img').classList.remove('hidden');
            document.getElementById('modal-video').classList.add('hidden');
            document.getElementById('btn-snap').classList.add('hidden');
            document.getElementById('btn-start-camera').classList.remove('hidden');
        }

        async function saveStudent() {
            const btn = document.getElementById('btn-save-student');
            const data = {
                id: document.getElementById('modal-studentid').value,
                name: document.getElementById('modal-name').value,
                class: document.getElementById('modal-class').value,
                // แก้ไขชื่อคีย์ให้ตรงกับ Code.gs (ImageDataBase64)
                imagedata: capturedImageData || (currentEditingStudent ? currentEditingStudent.imagedatabase64 : '')
            };
            if (!data.id || !data.name || !data.imagedata) return alert("กรุณากรอกข้อมูลและถ่ายรูปให้ครบ");
            
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            const action = currentEditingStudent ? 'updateStudent' : 'addStudent';
            if (currentEditingStudent) data.rowIndex = currentEditingStudent.rowIndex;

            const res = await apiCall({ action, data });
            if (res.success) { alert("สำเร็จ!"); location.reload(); }
            else { alert("ล้มเหลว: " + res.error); btn.disabled = false; btn.innerText = "บันทึกข้อมูล"; }
        }

        async function finishAttendance() {
            const hr = new Date().getHours(), min = new Date().getMinutes();
            const isLate = (hr > 8 || (hr === 8 && min >= 31));
            const isAutoSummary = (hr >= 9);

            const records = students.map(s => {
                const checked = checkedInToday.get(s.studentid);
                let status = checked ? (isLate ? 'สาย' : 'มาทำงาน') : (isAutoSummary ? 'ขาด' : null);
                if (!status) return null;

                return {
                    id: s.studentid, name: s.name, class: s.class, status: status,
                    timestamp: new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Bangkok' }).format(new Date()).replace(' ', 'T') + '.000Z',
                    location: 'พิกัดอัตโนมัติ'
                };
            }).filter(r => r !== null);

            if (records.length === 0) return alert("ไม่มีข้อมูลสรุป (สรุปคนขาดหลัง 09:00 น.)");
            const res = await apiCall({ action: 'recordAttendanceUpdate', data: records });
            if (res.success) { alert("บันทึกสำเร็จ!"); location.reload(); }
        }

        function renderDashboard() {
            const dateInput = document.getElementById('dashboard-date').value;
            const filtered = attendance.filter(r => new Date(r.timestamp).toISOString().split('T')[0] === dateInput);
            
            const p = filtered.filter(r => r.status === 'มาทำงาน').length;
            const l = filtered.filter(r => r.status === 'สาย').length;
            const a = filtered.filter(r => r.status === 'ขาด').length;

            document.getElementById('stat-present').innerText = p;
            document.getElementById('stat-late').innerText = l;
            document.getElementById('stat-absent').innerText = a;

            const lateList = document.getElementById('late-list');
            const absentList = document.getElementById('absent-list');
            lateList.innerHTML = ''; absentList.innerHTML = '';

            filtered.forEach(r => {
                const li = `<li class="p-2 bg-gray-50 rounded border-l-4 ${r.status === 'สาย' ? 'border-orange-500' : 'border-red-500'} text-xs font-bold">
                    ${r.name} ${r.status === 'สาย' ? `(${new Date(r.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'})} น.)` : ''}
                </li>`;
                if (r.status === 'สาย') lateList.innerHTML += li;
                else if (r.status === 'ขาด') absentList.innerHTML += li;
            });
            updateChart(p, l, a);
        }

        let pieChart = null;
        function updateChart(p, l, a) {
            const ctx = document.getElementById('attendance-pie-chart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctx, {
                type: 'pie',
                data: { labels: ['มาทำงาน', 'สาย', 'ขาด'], datasets: [{ data: [p, l, a], backgroundColor: ['#10B981', '#F59E0B', '#EF4444'] }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderStudentTable() {
            const body = document.getElementById('student-table-body');
            body.innerHTML = students.map(s => `<tr>
                <td class="px-6 py-3"><img src="${s.imagedatabase64}" class="w-10 h-10 rounded-full object-cover"></td>
                <td class="px-6 py-3 text-sm">${s.studentid}</td>
                <td class="px-6 py-3 text-sm">${s.name}</td>
                <td class="px-6 py-3 text-center">
                    <button onclick="deleteStudent(${s.rowIndex})" class="text-red-600 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </td>
            </tr>`).join('');
            lucide.createIcons();
        }

        async function deleteStudent(rowIndex) {
            if (confirm("ลบพนักงานคนนี้?")) {
                const res = await apiCall({ action: 'deleteStudent', data: { rowIndex } });
                if (res.success) location.reload();
            }
        }

        function stopCamera(id) {
            const v = document.getElementById(id);
            if (v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        }

        async function apiCall(payload) {
            try {
                const r = await fetch(gasWebAppUrl, { method: 'POST', body: JSON.stringify(payload) });
                return await r.json();
            } catch (e) { return { success: false, error: e.message }; }
        }

        function saveGasUrl() {
            const url = document.getElementById('gas-url').value;
            if (url.includes('script.google.com')) {
                localStorage.setItem(GAS_URL_KEY, url);
                location.reload();
            }
        }

        function openStudentModal() {
            currentEditingStudent = null; capturedImageData = null;
            document.getElementById('student-modal').classList.remove('hidden');
        }

        function closeStudentModal() {
            stopCamera('modal-video');
            document.getElementById('student-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
